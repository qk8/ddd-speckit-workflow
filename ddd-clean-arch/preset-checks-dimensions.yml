# ── Quality Checks: Dimension Reference ──────────────────────────
#
# NOTE: This file defines the intended dimension framework but the
# sub_checks are NOT invoked through this framework at runtime.
# Scripts are invoked directly in workflow YAMLs (see 07-verify.yml
# and 05-implement-02-core.yml).
#
# Dimension -> Script mapping (for reference):
#   test_execution.regression      -> scripts/run-regression.sh
#   test_execution.new_tests       -> scripts/run-new-tests.sh
#   code_quality.lint              -> scripts/run-lint.sh
#   code_quality.complexity        -> scripts/verify-code-quality.sh
#   code_quality.naming            -> scripts/verify-naming-conventions.sh
#   spec_compliance.drift          -> scripts/quick-drift-check.sh
#   spec_compliance.constraints    -> scripts/run-antihallucination.sh
#   spec_compliance.api_surface    -> scripts/api-surface-check.sh
#   security.secret_scan           -> scripts/secret-scan.sh
#   security.owasp                 -> scripts/run-owasp-basic.sh
#   security.session_security      -> scripts/run-session-security.sh
#   test_design.test_quality       -> scripts/verify-test-quality.sh
#   test_design.failure_modes      -> scripts/check-failure-modes.sh
#   test_design.negative_tests     -> scripts/verify-negative-tests.sh
#   integration.arch_tests         -> scripts/run-arch-tests.sh
#   integration.contract           -> scripts/validate-api-contract.sh
#   integration.migration          -> scripts/run-migration-test.sh
#   integration.crosscutting       -> scripts/check-crosscutting.sh
#   resilience.resilience_testing  -> scripts/check-resilience.sh
#   resilience.adversarial         -> scripts/check-adversarial.sh
#   performance.performance_budget -> scripts/check-performance-budget.sh
#   performance.quantitative       -> scripts/run-quantitative.sh
#
# To activate the dimension framework, a check-runner orchestrator
# script would need to be built that reads this YAML and invokes
# the sub_checks in order. This is tracked as a future enhancement.
