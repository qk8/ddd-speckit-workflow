# ── Quality Checks: 8 consolidated dimensions ─────────────────────
# Each dimension groups related sub-checks. The check runner expands
# dimensions into sub-checks at runtime. Old check IDs (BC, D, L, etc.)
# are kept as aliases for backward compatibility.
#
# Dimension consolidation mapping:
#   test_execution    → BC (regression + new_tests)
#   code_quality      → D, V (lint + complexity + naming)
#   spec_compliance   → L, Z, AS (drift + constraints + api_surface + failure_modes)
#   security          → I, O (secret_scan + owasp + session_security merged into O)
#   test_design       → P, NT (test_quality + negative_tests)
#   integration       → A, K, F, N (arch_tests + contract + migration + crosscutting)
#   resilience        → resilience_testing + adversarial (no legacy ID)
#   performance       → J, R (performance_budget + quantitative)
#
# Standalone checks (don't fit dimensions): E, G, H, AC

checks:
  # ── Dimensions (grouped sub-checks) ──────────────────────────────

  test_execution:
    name: "Test Execution"
    description: "New tests run AND full regression suite passes"
    tier: critical
    applies_to: all
    runs_on: per_task
    sub_checks:
      regression:
        script: "run-regression.sh"
        description: "Full regression suite passes"
      new_tests:
        script: "run-new-tests.sh"
        description: "New tests compile and pass"

  code_quality:
    name: "Code Quality"
    description: "Lint, complexity, and naming standards"
    tier: critical
    applies_to: all
    runs_on: per_task
    sub_checks:
      lint:
        script: "run-lint.sh"
        description: "Project linter passes"
      complexity:
        script: "verify-code-quality.sh"
        description: "Function length, nesting depth, cyclomatic complexity within thresholds"
      naming:
        script: "verify-naming-conventions.sh"
        description: "Naming conventions follow language/project standards"

  spec_compliance:
    name: "Spec Compliance"
    description: "Implementation matches spec — no drift, constraints honored, API surface consistent"
    tier: critical
    applies_to: all
    runs_on: per_task
    sub_checks:
      drift:
        script: "quick-drift-check.sh"
        description: "No constraint drift from plan"
      constraints:
        script: "run-antihallucination.sh"
        description: "No hallucinated features or API surfaces"
      api_surface:
        script: "api-surface-check.sh"
        description: "API surface consistent across tasks"

  security:
    name: "Security"
    description: "Secrets, OWASP basics, session/token security"
    tier: critical
    applies_to: [backend-domain, backend-infra, backend-api, shared, frontend-data, frontend-feature]
    runs_on: per_task
    sub_checks:
      secret_scan:
        script: "secret-scan.sh"
        description: "No hardcoded secrets, keys, or tokens"
      owasp:
        script: "run-owasp-basic.sh"
        description: "Basic OWASP Top 10 compliance"
      session_security:
        script: "run-session-security.sh"
        description: "Session and token security patterns"

  test_design:
    name: "Test Design"
    description: "Test quality, failure mode coverage, negative tests"
    tier: secondary
    applies_to: all
    runs_on: per_task
    sub_checks:
      test_quality:
        script: "verify-test-quality.sh"
        description: "Tests prove acceptance criteria, proper fixture usage"
      failure_modes:
        script: "check-failure-modes.sh"
        description: "Error paths and edge cases covered"
      negative_tests:
        script: "verify-negative-tests.sh"
        description: "Negative tests for public APIs (invalid input, unauthorized)"

  integration:
    name: "Integration"
    description: "Architecture tests, API contracts, migrations, cross-cutting concerns"
    tier: secondary
    applies_to: [backend-domain, backend-infra, backend-api, shared]
    runs_on: module_boundary
    sub_checks:
      arch_tests:
        script: "run-arch-tests.sh"
        description: "Layer boundaries respected (domain ← application ← infrastructure)"
      contract:
        script: "validate-api-contract.sh"
        description: "API contract changes are backward compatible"
      migration:
        script: "run-migration-test.sh"
        description: "Database migrations are reversible and tested"
      crosscutting:
        script: "check-crosscutting.sh"
        description: "Cross-cutting concerns properly delegated"

  resilience:
    name: "Resilience"
    description: "Resilience testing and adversarial input handling"
    tier: tertiary
    applies_to: [backend-api, backend-infra, shared]
    runs_on: retro_interval
    sub_checks:
      resilience_testing:
        script: "check-resilience.sh"
        description: "Circuit breakers, retries, timeouts tested"
      adversarial:
        script: "check-adversarial.sh"
        description: "Malformed input, rate limiting, chaos scenarios"

  performance:
    name: "Performance"
    description: "Performance budgets and quantitative gates"
    tier: tertiary
    applies_to: [backend-api, frontend-feature, shared]
    runs_on: retro_interval
    sub_checks:
      performance_budget:
        script: "check-performance-budget.sh"
        description: "Response times, throughput within budget"
      quantitative:
        script: "run-quantitative.sh"
        description: "Quantitative performance gates pass"

  # ── Standalone checks (don't fit dimensions) ────────────────────

  E:
    name: "Dependency Vulnerability Scan"
    tier: secondary
    applies_to: [backend-domain, backend-infra, backend-api, shared]
    runs_on: per_task

  G:
    name: "Error Handling Assertions"
    tier: secondary
    applies_to: [backend-api, frontend-data]
    runs_on: per_task

  H:
    name: "Browser Verification"
    tier: tertiary
    applies_to: [frontend-feature, e2e]
    runs_on: per_task

  AC:
    name: "Acceptance Criteria Coverage"
    description: "Every acceptance criterion has at least one matching test"
    tier: secondary
    applies_to: all
    runs_on: per_task
