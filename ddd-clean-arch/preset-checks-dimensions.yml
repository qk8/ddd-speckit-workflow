# ── Quality Checks: Dimension Reference (SOURCE OF TRUTH for check-runner.sh) ──
#
# Each dimension declares its sub-checks and the script that implements them.
# The check-runner.sh reads this file to expand dimensions at runtime.
# If a dimension is missing here, the runner falls back to hardcoded defaults.

dimensions:
  test_execution:
    sub_checks:
      regression:
        script: run-regression.sh
        description: "Run full regression test suite"
      new_tests:
        script: run-new-tests.sh
        description: "Verify new tests pass"

  code_quality:
    sub_checks:
      lint:
        script: run-lint.sh
        description: "No lint errors"
      complexity:
        script: verify-code-quality.sh
        description: "Cyclomatic complexity within thresholds"
      naming:
        script: check-naming.sh
        description: "Ubiquitous language compliance"

  spec_compliance:
    sub_checks:
      drift:
        script: quick-drift-check.sh
        description: "Constraint drift detection"
      constraints:
        script: run-antihallucination.sh
        description: "Implementation matches plan.md"
      api_surface:
        script: api-surface-check.sh
        description: "API surface matches contract"

  security:
    sub_checks:
      secret_scan:
        script: secret-scan.sh
        description: "No credentials or secrets"
      owasp:
        script: run-owasp-basic.sh
        description: "OWASP Top 10 checks"
      session_security:
        script: run-session-security.sh
        description: "JWT/session security"

  test_design:
    sub_checks:
      test_quality:
        script: verify-test-quality.sh
        description: "Assertions prove acceptance criteria"
      failure_modes:
        script: check-failure-modes.sh
        description: "Error paths have tests"
      negative_tests:
        script: verify-negative-tests.sh
        description: "Negative test coverage"

  integration:
    sub_checks:
      arch_tests:
        script: run-arch-tests.sh
        description: "Clean architecture enforcement"
      contract:
        script: validate-api-contract.sh
        description: "API contract compliance"
      migration:
        script: run-migration-test.sh
        description: "Schema migration tests"
      crosscutting:
        script: check-crosscutting.sh
        description: "Cross-cutting concern audit"

  resilience:
    sub_checks:
      resilience_testing:
        script: check-resilience.sh
        description: "Circuit breakers, retries, timeouts"
      adversarial:
        script: check-adversarial.sh
        description: "Adversarial input handling"

  performance:
    sub_checks:
      performance_budget:
        script: check-performance-budget.sh
        description: "Response times within budget"
      quantitative:
        script: run-quantitative.sh
        description: "Coverage thresholds, type check"
