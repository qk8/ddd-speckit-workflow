# ── Routing tables — dimensions per module type per tier ────────────
# routing: all applicable dimensions (regenerated by derive-routing.sh)
# routing_critical: dimensions that run on every task
# routing_secondary: dimensions that run only on last task for module type
# NOTE: resilience remains tertiary with retro_interval cadence (NOT in routing tables).
# performance is in routing_secondary for backend-api and frontend-feature module types.

routing:
  backend-domain:   [E, code_quality, integration, security, spec_compliance, test_design, test_execution]
  backend-infra:    [E, code_quality, integration, security, spec_compliance, test_design, test_execution]
  backend-api:      [E, G, code_quality, integration, security, spec_compliance, test_design, test_execution]
  shared:           [E, code_quality, integration, security, spec_compliance, test_design, test_execution]
  integration:      [code_quality, spec_compliance, test_design, test_execution]
  frontend-data:    [G, code_quality, security, spec_compliance, test_design, test_execution]
  frontend-feature: [code_quality, security, spec_compliance, test_design, test_execution]
  e2e:              [code_quality, spec_compliance, test_design, test_execution]

routing_critical:
  backend-domain:   [code_quality, security, spec_compliance, test_execution]
  backend-infra:    [code_quality, security, spec_compliance, test_execution]
  backend-api:      [code_quality, security, spec_compliance, test_execution]
  shared:           [code_quality, security, spec_compliance, test_execution]
  integration:      [code_quality, spec_compliance, test_execution]
  frontend-data:    [code_quality, security, spec_compliance, test_execution]
  frontend-feature: [code_quality, security, spec_compliance, test_execution]
  e2e:              [code_quality, spec_compliance, test_execution]

routing_secondary:
  backend-domain:   [E, integration, test_design]
  backend-infra:    [E, integration, test_design]
  backend-api:      [E, G, integration, performance, test_design]
  shared:           [E, integration, test_design]
  integration:      [test_design]
  frontend-data:    [G, test_design]
  frontend-feature: [performance, test_design]
  e2e:              [test_design]

# ── Check profiles — filter dimensions by project complexity ──────
check_profiles:
  minimal: [test_execution, spec_compliance, security, code_quality]
  standard: [test_execution, spec_compliance, security, code_quality, test_design, integration]
  full: [test_execution, spec_compliance, security, code_quality, test_design, integration, performance, resilience, E, G]
