id: ddd-clean-arch
name: "DDD + Clean Architecture"
version: "2.0.0"
author: "your-org"
description: >
  Overrides Spec Kit's plan, tasks, and implement templates with
  Domain-Driven Design and Clean Architecture standards. All project
  context is read from project-brief.md — no CLI input duplication.
  Produces a 20-section architecture document as the technical plan,
  a structured backlog with dependency tracking, and enforces failing-
  first tests, architectural enforcement tests, observability checks,
  migration schema validation, and dependency vulnerability scanning
  on every implementation task.
tags:
  - ddd
  - clean-architecture
  - modular-monolith
  - production-grade

# Template overrides: replace Spec Kit's default templates with ours.
# Spec Kit uses the 'replace' strategy — our file takes full precedence.
templates:
  plan:
    source: templates/plan-template.md
    strategy: replace
  tasks:
    source: templates/tasks-template.md
    strategy: replace
  constitution:
    source: templates/constitution-template.md
    strategy: replace

# Command overrides: replace Spec Kit's default speckit.implement.
commands:
  - speckit.implement
  - speckit.check
  - speckit.verify
  - speckit.review
  - speckit.code-review
  - speckit.retrospect
  - speckit.status
  - speckit.context
  - speckit.test
  - speckit.spec-revise

# Quality checks: each check declares which task types it applies to.
# The routing table is a convenience lookup derived from applies_to.
checks:
  A:
    name: "Architectural Tests"
    tier: critical
    applies_to: [backend-domain, backend-infra, backend-api]
  BC:
    name: "New Tests + Regression"
    # BC = TEST EXECUTION: new tests run AND full regression suite passes. Failure = new tests fail OR existing tests broke.
    tier: critical
    applies_to: all
  D:
    name: "Linter"
    tier: critical
    applies_to: all
  E:
    name: "Dependency Vulnerability Scan"
    tier: secondary
    applies_to: [backend-domain, backend-infra, backend-api, shared]
  F:
    name: "Migration Test"
    tier: secondary
    applies_to: [backend-infra]
  G:
    name: "Error Handling Assertions"
    tier: secondary
    applies_to: [backend-api, frontend-data]
  H:
    name: "Browser Verification"
    tier: tertiary
    applies_to: [frontend-feature, e2e]
  I:
    name: "Secret Scanning"
    tier: critical
    applies_to: all
  J:
    name: "Performance Budget"
    tier: secondary
    applies_to: [backend-api, frontend-feature]
  K:
    name: "API Contract Enforcement"
    tier: secondary
    applies_to: [backend-api, shared]
  L:
    name: "Anti-Hallucination Check"
    tier: critical
    applies_to: all
  M:
    name: "Failure Mode Coverage"
    tier: secondary
    applies_to: all
  N:
    name: "Cross-Cutting Concern Audit"
    tier: secondary
    applies_to: [backend-api, shared]
  O:
    name: "Security Hardening"
    tier: secondary
    applies_to: [backend-api, backend-infra, frontend-data, frontend-feature]
  P:
    name: "Test Quality Review"
    # P = TEST DESIGN: assertions prove acceptance criteria, factory/fixture usage, no stale/unrelated tests. Complementary to BC (BC=runs, P=well-written).
    tier: tertiary
    applies_to: all
  Q:
    name: "Resilience Testing"
    tier: tertiary
    applies_to: [backend-api, backend-infra]
  R:
    name: "Quantitative Pass Gate"
    tier: tertiary
    applies_to: [backend-api, shared]
  S:
    name: "Property-Based Test Coverage"
    tier: tertiary
    applies_to: all
  T:
    name: "Adversarial Input Testing"
    tier: tertiary
    applies_to: [backend-api, shared]
  U:
    name: "Session & Token Security"
    tier: tertiary
    applies_to: [backend-api]
  Z:
    name: "Constraint Drift Detection"
    tier: critical
    applies_to: all
  AS:
    name: "API Surface Consistency"
    # AS = CROSS-TASK: method signatures, domain events, repository interfaces
    # consistent across all implemented tasks. Flags API drift between batches.
    tier: critical
    applies_to: all
  AC:
    name: "Acceptance Criteria Coverage"
    # AC = DETERMINISTIC: verifies every acceptance criterion in tasks.md
    # has at least one matching test file. Uses keyword/pattern matching.
    tier: secondary
    applies_to: all

# Derived routing table — auto-derived from checks[].applies_to.
# Regenerate with: scripts/derive-routing.sh
# Drift from derived values is flagged by: scripts/validate-routing-table.sh
routing:
  backend-domain:   [A, AC, BC, D, E, I, L, M, P, S, Z]
  backend-infra:    [A, AC, BC, D, E, F, I, L, M, O, P, Q, S, Z]
  backend-api:      [A, AC, BC, D, E, G, I, J, K, L, M, N, O, P, Q, R, S, T, U, Z]
  shared:           [AC, BC, D, E, I, K, L, M, N, P, R, S, T, Z]
  integration:      [AC, BC, D, I, L, M, P, S, Z]
  frontend-data:    [AC, BC, D, G, I, L, M, O, P, S, Z]
  frontend-feature: [AC, BC, D, H, I, J, L, M, O, P, S, Z]
  e2e:              [AC, BC, D, H, I, L, M, P, S, Z]

# Routing tables by tier — which checks apply to each module type per tier.
# routing_critical: checks that run on every task execution.
# routing_secondary: checks that run only when the LAST task for a module type completes.
routing_critical:
  backend-domain:   [A, AS, BC, D, I, L, Z]
  backend-infra:    [A, AS, BC, D, I, L, O, Z]
  backend-api:      [A, AS, BC, D, I, L, O, Z]
  shared:           [AS, BC, D, I, L, Z]
  integration:      [AS, BC, D, I, L, Z]
  frontend-data:    [AS, BC, D, I, L, Z]
  frontend-feature: [AS, BC, D, I, L, Z]
  e2e:              [AS, BC, D, I, L, Z]

routing_secondary:
  backend-domain:   [AC, E, M]
  backend-infra:    [AC, E, F, M, Q]
  backend-api:      [AC, E, G, J, K, M, N, R, T]
  shared:           [AC, E, K, M, N, R, T]
  integration:      [AC, M]
  frontend-data:    [AC, G, M, O]
  frontend-feature: [AC, J, M, O]
  e2e:              [AC, M]

# Adaptive retrospective cadence — single source of truth.
# check-tasks.sh reads these values; speckit.retrospect.md references them.
# I2: Periodic checks have separate intervals to reduce cost.
cadence:
  retro_interval:
    simple: 15
    medium: 10
    complex: 5
  first_retro_threshold: 5
  drift_check_interval:
    # How often to run constraint drift check [Z] (separate from retro)
    simple: 20
    medium: 15
    complex: 10
  traceability_check_interval:
    # How often to run traceability re-check (expensive, less frequent)
    simple: 25
    medium: 20
    complex: 15

# I1: Check profiles — filter checks by project complexity
# minimal: core 6 checks (A, BC, D, I, L, Z)
# standard: core 8 (+ K, M)
# full: all 21 checks
# Use project-brief.md's project_profile field to select.
check_profiles:
  minimal: [A, BC, D, I, L, Z]
  standard: [A, AC, BC, D, I, L, Z, K, M]
  full: [A, AC, BC, D, E, F, G, H, I, J, K, L, M, N, O, P, Q, R, S, T, U, Z, AS]

# Auto-approve human gates when deterministic checks pass.
# When enabled, acceptance/quality/TDD gates skip to approve
# if all critical checks passed (check-gate-preconditions.sh returns GATE_BLOCKED=false).
auto_approve:
  enabled: false
  # These checks always require human approval even when auto_approve is enabled
  non_auto_approvable:
    - review-tdd
    - review-plan-revision-gate
    - review-speckit-review
