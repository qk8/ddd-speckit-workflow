# DDD + Clean Architecture Preset — modular config
# This file is a thin wrapper. The build script (build-workflow.sh) merges
# the section files below into a single preset at build time.
#
# For direct use with `specify preset add`, run:
#   bash scripts/build-workflow.sh --merge-preset ddd-clean-arch/preset.yml
# which produces the merged output.

id: ddd-clean-arch
name: "DDD + Clean Architecture"
version: "2.0.0"
author: "your-org"
description: >
  Overrides Spec Kit's plan, tasks, and implement templates with
  Domain-Driven Design and Clean Architecture standards. All project
  context is read from project-brief.md — no CLI input duplication.
  Produces a 20-section architecture document as the technical plan,
  a structured backlog with dependency tracking, and enforces failing-
  first tests, architectural enforcement tests, observability checks,
  migration schema validation, and dependency vulnerability scanning
  on every implementation task.
tags:
  - ddd
  - clean-architecture
  - modular-monolith
  - production-grade

# ── Section files (merged by build-workflow.sh) ───────────────────
# Each section is in a separate file for maintainability.
# Order matters: later sections override earlier ones for the same key.
_sections:
  - preset-templates.yml
  - preset-commands.yml
  - preset-checks-dimensions.yml
  - preset-routing.yml
  - preset-cadence.yml
  - preset-behavior.yml
