id: ddd-clean-arch
name: "DDD + Clean Architecture"
version: "2.0.0"
author: "your-org"
description: >
  Overrides Spec Kit's plan, tasks, and implement templates with
  Domain-Driven Design and Clean Architecture standards. All project
  context is read from project-brief.md — no CLI input duplication.
  Produces a 20-section architecture document as the technical plan,
  a structured backlog with dependency tracking, and enforces failing-
  first tests, architectural enforcement tests, observability checks,
  migration schema validation, and dependency vulnerability scanning
  on every implementation task.
tags:
  - ddd
  - clean-architecture
  - modular-monolith
  - production-grade

# Template overrides: replace Spec Kit's default templates with ours.
templates:
  plan:
    source: templates/plan-template.md
    strategy: replace
  tasks:
    source: templates/tasks-template.md
    strategy: replace
  constitution:
    source: templates/constitution-template.md
    strategy: replace

# Command overrides: replace Spec Kit's default speckit.implement.
commands:
  - speckit.implement
  - speckit.check
  - speckit.verify
  - speckit.review
  - speckit.code-review
  - speckit.retrospect
  - speckit.status
  - speckit.context
  - speckit.test
  - speckit.spec-revise

# ── Quality Checks: 8 consolidated dimensions ─────────────────────
# Each dimension groups related sub-checks. The check runner expands
# dimensions into sub-checks at runtime. Old check IDs (BC, D, L, etc.)
# are kept as aliases for backward compatibility.
#
# Dimension consolidation mapping:
#   test_execution    → BC (regression + new_tests)
#   code_quality      → D, V (lint + complexity + naming)
#   spec_compliance   → L, Z, AS (drift + constraints + api_surface)
#   security          → I, O, U (secret_scan + owasp + session_security)
#   test_design       → P, M, NT (test_quality + failure_modes + negative_tests)
#   integration       → A, K, F, N (arch_tests + contract + migration + crosscutting)
#   resilience        → Q, T (resilience_testing + adversarial)
#   performance       → J, R (performance_budget + quantitative)
#
# Standalone checks (don't fit dimensions): E, G, H, AC

checks:
  # ── Dimensions (grouped sub-checks) ──────────────────────────────

  test_execution:
    name: "Test Execution"
    description: "New tests run AND full regression suite passes"
    tier: critical
    applies_to: all
    runs_on: per_task
    sub_checks:
      regression:
        script: "run-regression.sh"
        description: "Full regression suite passes"
      new_tests:
        script: "run-new-tests.sh"
        description: "New tests compile and pass"

  code_quality:
    name: "Code Quality"
    description: "Lint, complexity, and naming standards"
    tier: critical
    applies_to: all
    runs_on: per_task
    sub_checks:
      lint:
        script: "run-lint.sh"
        description: "Project linter passes"
      complexity:
        script: "verify-code-quality.sh"
        description: "Function length, nesting depth, cyclomatic complexity within thresholds"
      naming:
        script: "verify-naming-conventions.sh"
        description: "Naming conventions follow language/project standards"

  spec_compliance:
    name: "Spec Compliance"
    description: "Implementation matches spec — no drift, constraints honored, API surface consistent"
    tier: critical
    applies_to: all
    runs_on: per_task
    sub_checks:
      drift:
        script: "quick-drift-check.sh"
        description: "No constraint drift from plan"
      constraints:
        script: "run-antihallucination.sh"
        description: "No hallucinated features or API surfaces"
      api_surface:
        script: "api-surface-check.sh"
        description: "API surface consistent across tasks"

  security:
    name: "Security"
    description: "Secrets, OWASP basics, session/token security"
    tier: critical
    applies_to: [backend-domain, backend-infra, backend-api, shared, frontend-data, frontend-feature]
    runs_on: per_task
    sub_checks:
      secret_scan:
        script: "secret-scan.sh"
        description: "No hardcoded secrets, keys, or tokens"
      owasp:
        script: "run-owasp-basic.sh"
        description: "Basic OWASP Top 10 compliance"
      session_security:
        script: "run-session-security.sh"
        description: "Session and token security patterns"

  test_design:
    name: "Test Design"
    description: "Test quality, failure mode coverage, negative tests"
    tier: secondary
    applies_to: all
    runs_on: per_task
    sub_checks:
      test_quality:
        script: "verify-test-quality.sh"
        description: "Tests prove acceptance criteria, proper fixture usage"
      failure_modes:
        script: "check-failure-modes.sh"
        description: "Error paths and edge cases covered"
      negative_tests:
        script: "verify-negative-tests.sh"
        description: "Negative tests for public APIs (invalid input, unauthorized)"

  integration:
    name: "Integration"
    description: "Architecture tests, API contracts, migrations, cross-cutting concerns"
    tier: secondary
    applies_to: [backend-domain, backend-infra, backend-api, shared]
    runs_on: module_boundary
    sub_checks:
      arch_tests:
        script: "run-arch-tests.sh"
        description: "Layer boundaries respected (domain ← application ← infrastructure)"
      contract:
        script: "validate-api-contract.sh"
        description: "API contract changes are backward compatible"
      migration:
        script: "run-migration-test.sh"
        description: "Database migrations are reversible and tested"
      crosscutting:
        script: "check-crosscutting.sh"
        description: "Cross-cutting concerns properly delegated"

  resilience:
    name: "Resilience"
    description: "Resilience testing and adversarial input handling"
    tier: tertiary
    applies_to: [backend-api, backend-infra, shared]
    runs_on: retro_interval
    sub_checks:
      resilience_testing:
        script: "check-resilience.sh"
        description: "Circuit breakers, retries, timeouts tested"
      adversarial:
        script: "check-adversarial.sh"
        description: "Malformed input, rate limiting, chaos scenarios"

  performance:
    name: "Performance"
    description: "Performance budgets and quantitative gates"
    tier: tertiary
    applies_to: [backend-api, frontend-feature, shared]
    runs_on: retro_interval
    sub_checks:
      performance_budget:
        script: "check-performance-budget.sh"
        description: "Response times, throughput within budget"
      quantitative:
        script: "run-quantitative.sh"
        description: "Quantitative performance gates pass"

  # ── Standalone checks (don't fit dimensions) ────────────────────

  E:
    name: "Dependency Vulnerability Scan"
    tier: secondary
    applies_to: [backend-domain, backend-infra, backend-api, shared]
    runs_on: per_task

  G:
    name: "Error Handling Assertions"
    tier: secondary
    applies_to: [backend-api, frontend-data]
    runs_on: per_task

  H:
    name: "Browser Verification"
    tier: tertiary
    applies_to: [frontend-feature, e2e]
    runs_on: per_task

  AC:
    name: "Acceptance Criteria Coverage"
    description: "Every acceptance criterion has at least one matching test"
    tier: secondary
    applies_to: all
    runs_on: per_task

# ── Routing tables — dimensions per module type per tier ────────────
# routing: all applicable dimensions (regenerated by derive-routing.sh)
# routing_critical: dimensions that run on every task
# routing_secondary: dimensions that run only on last task for module type
# Tertiary dimensions (resilience, performance) are NOT in routing tables

routing:
  backend-domain:   [AC, E, code_quality, integration, security, spec_compliance, test_design, test_execution]
  backend-infra:    [AC, E, code_quality, integration, security, spec_compliance, test_design, test_execution]
  backend-api:      [AC, E, G, code_quality, integration, security, spec_compliance, test_design, test_execution]
  shared:           [AC, E, code_quality, integration, security, spec_compliance, test_design, test_execution]
  integration:      [AC, code_quality, spec_compliance, test_design, test_execution]
  frontend-data:    [AC, G, code_quality, security, spec_compliance, test_design, test_execution]
  frontend-feature: [AC, code_quality, security, spec_compliance, test_design, test_execution]
  e2e:              [AC, code_quality, spec_compliance, test_design, test_execution]

routing_critical:
  backend-domain:   [code_quality, security, spec_compliance, test_execution]
  backend-infra:    [code_quality, security, spec_compliance, test_execution]
  backend-api:      [code_quality, security, spec_compliance, test_execution]
  shared:           [code_quality, security, spec_compliance, test_execution]
  integration:      [code_quality, spec_compliance, test_execution]
  frontend-data:    [code_quality, security, spec_compliance, test_execution]
  frontend-feature: [code_quality, security, spec_compliance, test_execution]
  e2e:              [code_quality, spec_compliance, test_execution]

routing_secondary:
  backend-domain:   [AC, E, integration, test_design]
  backend-infra:    [AC, E, integration, test_design]
  backend-api:      [AC, E, G, integration, test_design]
  shared:           [AC, E, integration, test_design]
  integration:      [AC, test_design]
  frontend-data:    [AC, G, test_design]
  frontend-feature: [AC, test_design]
  e2e:              [AC, test_design]

# ── Check profiles — filter dimensions by project complexity ──────
check_profiles:
  minimal: [test_execution, spec_compliance, security, code_quality]
  standard: [test_execution, spec_compliance, security, code_quality, test_design, integration, AC]
  full: [test_execution, spec_compliance, security, code_quality, test_design, integration, performance, resilience, E, G, AC]

# ── Adaptive retrospective cadence ────────────────────────────────
cadence:
  retro_interval:
    simple: 15
    medium: 10
    complex: 5
  first_retro_threshold: 5
  drift_check_interval:
    simple: 20
    medium: 15
    complex: 10
  traceability_check_interval:
    simple: 25
    medium: 20
    complex: 15

# ── Auto-approve human gates when deterministic checks pass ────────
auto_approve:
  enabled: true
  non_auto_approvable:
    - review-tdd
    - review-plan-revision-gate
    - review-speckit-review

# ── Auto-revise when revision threshold is exceeded ───────────────
# Instead of silently auto-approving, triggers speckit.retrospect
# to assess whether remaining tasks are worth pursuing.
# max_auto_revise: 1 per session — after that, human approval required.
auto_revise:
  enabled: true
  max_auto_revise: 1
