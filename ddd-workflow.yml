schema_version: "1.0"
workflow:
  id: "ddd-full-cycle"
  name: "DDD + Clean Architecture Full Cycle"
  version: "2.0.0"
  author: "your-org"
  description: >
    Full spec-driven development cycle with DDD and Clean Architecture.
    All project context is read from project-brief.md — no CLI duplication.
    Phases: clarify → spec → plan (§1–§20) → tasks → validate dependency graph
    → implement loop (batched parallel tasks, all checks via routing table, TDD,
    self-correction inline → adaptive retrospective → code-review
    (security, correctness, performance, maintainability, accessibility)
    → final verify.

requires:
  speckit_version: ">=0.7.2"
  integrations:
    any: ["claude"]

# No inputs — all project context comes from project-brief.md.
# Fill in project-brief.md before running this workflow.
inputs: {}

steps:

  # ── SETUP VALIDATION ──────────────────────────────────────────
  # Run deterministic prerequisite checks before invoking Claude.
  # Stops early if any FAIL — saves tokens and provides immediate feedback.
  - id: validate-setup
    type: shell
    command: "bash scripts/validate-setup.sh"

  # ── PREFLIGHT: VALIDATE project-brief.md ──────────────────────
  - id: preflight
    type: prompt
    integration: claude
    input:
      args: >
        Read project-brief.md.
        Check that ALL of the following fields are filled in
        (not placeholder text in brackets):
          - Project name
          - What does this system do (at least 2 sentences)
          - Stack: backend_language, backend_framework, database,
                   frontend_language, frontend_framework, monorepo_tool
          - Complexity: simple | medium | complex
          - At least one hard constraint or explicit "none"
          - At least one out-of-scope item or explicit "none"
          - Security posture

        If any field is missing or still contains placeholder text:
          List the missing fields and stop.
          Print: "Fill in project-brief.md and run the workflow again."

        If all fields are present:
          Print a one-paragraph summary of what you read.

        Also check the following tooling is installed locally:
          - gitleaks: run 'gitleaks version' — needed for secret scanning
          - node: run 'node --version' — needed for Playwright MCP

        If gitleaks is missing: print a warning suggesting
          'bash scripts/setup-hooks.sh' to install it.
        If node is missing: print a warning suggesting
          'bash scripts/setup-mcp.sh' after installing Node.js.

        Print: "project-brief.md is complete — proceeding."

  - id: review-preflight
    type: gate
    message: |
      Review the project-brief.md summary above.
      Does it correctly reflect your project?
      Revise to send back for clarification fixes.
      Select abort if the project brief needs significant rewriting.
    options: [approve, revise, abort]
    on_revise:
      - goto: clarify
    on_abort:
      - id: cleanup-abort-preflight
        type: shell
        command: >
          bash scripts/cleanup-abandoned-state.sh
          "$(bash scripts/find-first-feature.sh)"
          "preflight"
      - goto: abort

  # ── PHASE 1: CLARIFY (bounded) ──────────────────────────────────
  - id: clarify_round
    type: while
    condition: "true"
    max_iterations: 3
    steps:
      - id: clarify
        type: prompt
        integration: claude
        input:
          args: >
            Read project-brief.md fully.

            REVISION CONTEXT: If .specify/specs/[feature]/revision_history.md exists,
            read it. Do not repeat fixes that were already tried and rejected.

            Based on what you read, ask 3-5 targeted clarifying questions.
            Focus only on things that are genuinely ambiguous or missing and that
            would significantly affect architecture decisions.
            Do not ask about things already covered in the brief.
            Do not ask generic questions.

            Good questions probe: edge cases in the core domain, conflict
            resolution between competing requirements, specific compliance
            obligations, external system API constraints, and expected
            data volumes for the most critical operations.

      - id: check_clarify_threshold
        type: shell
        command: "bash scripts/gate-threshold.sh clarify {{ steps.clarify_round_iteration.output.count || 1 }}"

      - id: review-clarify
        type: gate
        message: |
          ━━ CLARIFY ROUND {{ steps.clarify_round_iteration.output.count || 1 }}/3 ━━

          Answer the clarifying questions above.
          Edit your answers directly in this gate if needed.
          Approve when requirements are well-understood.
          {% if steps.check_clarify_threshold.output.AUTO_APPROVE == 'true' %}
          **Revision threshold exceeded** ({{ steps.clarify_round_iteration.output.count || 1 }}/3).
          Approving on next iteration.
          {% endif %}
        options: [approve, re-clarify]
        on_re-clarify:
          - id: record-and-trim-clarify
            type: shell
            command: >
              bash scripts/record-and-trim.sh clarify_round
              "{{ steps.clarify_round_iteration.output.count || 1 }}"
          - goto: clarify

  # ── PHASE 2: SPEC ─────────────────────────────────────────────
  - id: specify
    command: speckit.specify
    integration: claude
    input:
      args: >
        Read project-brief.md and the clarification answers from the
        previous phase. Produce the feature spec (spec.md).

  - id: review-spec
    type: gate
    message: |
      Review .specify/specs/[feature]/spec.md
      Does it correctly capture user stories and acceptance requirements?
      Are there missing scenarios or incorrect assumptions?
      Approve to proceed to the technical plan.
    options: [approve, reject]
    on_reject: abort

  - id: audit_round
    type: while
    condition: "true"
    max_iterations: 3
    steps:
      - id: audit-spec
        type: prompt
        integration: claude
        input:
          args: >
            REVISION CONTEXT: If .specify/specs/[feature]/revision_history.md exists,
            read it. Do not repeat fixes that were already tried and rejected.

            Read .specify/specs/[feature]/spec.md. Then produce an adversarial
            audit with exactly these sections:

            ### Hidden Requirements
            [Requirements implied by the spec but not stated. For each finding:
            CITE: spec.md line [N]: '[exact spec sentence]' supports this finding.]

            ### Contradictions
            [Any two requirements that cannot both be true simultaneously. For each:
            CITE: spec.md line [N]: '[exact spec sentence A]' and
            CITE: spec.md line [M]: '[exact spec sentence B]' are contradictory.]

            ### Ambiguities
            [Any phrase a developer could interpret two different ways. For each:
            CITE: spec.md line [N]: '[ambiguous phrase]'.
            Possible interpretations: [list].]

            ### Missing Edge Cases
            [Empty states, error states, etc. For each:
            CITE: spec.md line [N]: '[related spec sentence]'.]

            ### Security Surfaces
            [Any feature that introduces a security surface not addressed in the spec.
            For each: CITE: spec.md line [N]: '[feature spec]'.]

            MANDATORY CITATION RULE: Every audit item MUST include a CITE line
            referencing the exact spec sentence (with line number) that supports
            the finding. Format: CITE: spec.md line [N]: '[exact spec sentence]'
            Findings without a CITE line are considered noise and should be
            excluded from the final report. Do not produce items without citations.

            Print the audit. Do NOT modify spec.md yet. The human will
            review and decide what to add.

      - id: check_audit_threshold
        type: shell
        command: "bash scripts/gate-threshold.sh spec {{ steps.audit_round_iteration.output.count || 1 }}"

      - id: review-audit
        type: gate
        message: |
          ━━ AUDIT ROUND {{ steps.audit_round_iteration.output.count || 1 }}/3 ━━

          Review the adversarial spec audit above.
          Edit spec.md to resolve every item: add missing requirements,
          clarify ambiguities, document contradictions resolved.
          Approve when the spec is unambiguous and complete.
          {% if steps.check_audit_threshold.output.AUTO_APPROVE == 'true' %}
          **Revision threshold exceeded**. Approving on next iteration.
          {% endif %}
        options: [approve, revise]
        on_revise:
          - id: record-and-trim-audit
            type: shell
            command: >
              bash scripts/record-and-trim.sh audit_round
              "{{ steps.audit_round_iteration.output.count || 1 }}"
          - goto: audit-spec

  # ── PHASE 3: PLAN — CONSOLIDATED IN 3 BATCHES ──────────────────
  # Batch 1: Core plan (§1–§16) — domain decisions, architecture,
  # reliability, data, testing, devex, failure modes, constraints.
  # Section production is conditional on project-brief.md Complexity field:
  #   SIMPLE: §1-§8, §11-§14 only. §16 with 5 constraints. Skip §9, §10, §15.
  #   MEDIUM: §1-§16 full. Skip §19 (ADR log) in plan-devex.
  #   COMPLEX: All sections §1-§20.
  - id: plan-full
    command: speckit.plan
    integration: claude
    input:
      args: >
        Read project-brief.md and .specify/specs/[feature]/spec.md.
        Use ddd-clean-arch/templates/plan-template.md.

        Read project-brief.md's Complexity field (simple | medium | complex).
        Produce sections based on complexity:

        SIMPLE:
          Produce only: §1 Requirements, §2 Ubiquitous language, §3 Bounded contexts,
          §4 Aggregates (full detail), §5 Domain services, §6 Architecture,
          §7 Cross-cutting concerns, §8 API design, §11 Reliability & observability,
          §12 Data design, §13 Testing strategy, §14 Monorepo & developer experience.
          Skip §9 Security (threat model), §10 Performance & scalability,
          §15 Edge cases & failure modes.
          For §16 Architectural constraints: produce exactly 5 instead of 10.
          End with: "Plan full (§1–§8, §11–§14, §16 reduced) complete. Continuing…"

        MEDIUM:
          Produce: §1–§12, §13 Testing strategy, §14 Monorepo & devex,
          §15 Edge cases & failure modes (minimum 10 domain-specific scenarios),
          §16 Architectural constraints (exactly 10).
          End with: "Plan full (§1–§16) complete. Continuing to companion files…"

        COMPLEX:
          Produce all sections §1–§16 with full detail as specified below.
          End with: "Plan full (§1–§16) complete. Continuing to companion files…"

        For MEDIUM and COMPLEX, produce sections §1 through §16:
          §1  Requirements
          §2  Ubiquitous language
          §3  Bounded contexts
          §4  Aggregates (full detail including concurrency and idempotency)
          §5  Domain services
          §6  Architecture (modules, dependency graph, layer rules)
          §7  Cross-cutting concerns (error taxonomy, transaction boundary,
              authorization, logging)
          §8  API design (all endpoints with full detail)
          §9  Security (threat model, CSP consistent with §8 token delivery
              and CORS)
          §10 Performance & scalability (end-to-end budget first, then
              backend p95 derived from it)
          §11 Reliability & observability (correlation ID from §8, health
              checks, circuit breakers for external deps only)
          §12 Data design (tables per aggregate root, indexes naming use cases,
              migration teardown scripts)
          §13 Testing strategy (api_testing_tool selected from backend_language,
              all three regression commands, e2e coverage focus, test data
              strategy, flaky test protocol, e2e data setup, E2E owner/pipeline)
          §14 Monorepo & developer experience (cache invalidation, local
              dev setup, ci_local_script: scripts/ci-local.sh)
          §15 Edge cases & failure modes (minimum 10 domain-specific scenarios
              with detection/response/recovery — not generic "upstream failure")
          §16 Architectural constraints (exactly 10, specific to this
              codebase — form: "Never [action] because [consequence]")

        Do NOT produce §17 onwards yet.
        Do NOT produce companion files yet.

  # Batch 2: Companion files — api-contract.yaml, data-model.sql, interfaces
  # These are lightweight, self-contained, and only depend on approved plan.md.
  - id: plan-artifacts
    command: speckit.plan
    integration: claude
    input:
      args: >
        §1–§16 of plan.md are approved. Produce companion files ONLY:

        docs/spec/api-contract.yaml
          OpenAPI 3.1. Error envelope as $component referenced everywhere.
          Every endpoint from §8. CORS + token delivery as top comment block.
          Cache-control response headers for cacheable endpoints.

        docs/spec/data-model.sql
          DDL from §12. Migration strategy as top comment block.
          Each table: comment stating aggregate and bounded context.
          Each index: comment stating which use case it supports.
          Include teardown SQL for test database setup (schema drop + recreate).

        docs/spec/backend-interfaces.[ext]
          Domain layer signatures only — no implementation bodies.
          Aggregate roots, value objects, domain events, repository interfaces.
          Zero infrastructure imports.

        docs/spec/frontend-interfaces.[ext]
          Four error types as discriminated union (tags match §7 exactly).
          Auth state type consistent with §8 token_delivery.
          One typed async function per endpoint — Result<T,E>, never throws.

        End with: "Plan artifacts complete. Continuing to DevEx files…"

  # Batch 3: DevEx files — gitignore, .env.example, CLAUDE.md, ci-local.sh, conventions.md
  - id: plan-devex
    command: speckit.plan
    integration: claude
    input:
      args: >
        §1–§16 of plan.md are approved. Produce §17–§20 and DevEx/config files:

        §17 Definition of done
          Concrete verifiable criteria. Must align with all checks in preset.yml routing table.
          Include: test file committed, regression suite green, secret scan clean.

        §18 Self-critique (mandatory — do not soften)
          The 3 weakest points. For each: problem, reason accepted, early warning signs,
          what changes under 20x load / second team / key dependency lost.

        §19 ADR log
          One ADR per: aggregate boundary decision, locking strategy, tech stack selection,
          bounded context boundary, token delivery, CORS policy, rendering strategy,
          contract sharing strategy, and any irreversible decision.

        §20 Architectural test inventory
          Generate enforcement test files:
            Java backend → [module]/src/test/java/arch/ArchitectureTest.java (ArchUnit)
            TypeScript backend → [module]/.dependency-cruiser.cjs
            Other → closest available static analysis tool config
            Frontend → [frontend-module]/.dependency-cruiser.cjs
          Run arch tests against the generated files only (no business logic yet).
          The arch tests must pass with zero violations on an empty domain.
          Populate §20 with the actual test file paths and tool names.

        .gitignore
          The workflow .gitignore covers common patterns.
          After copying, verify that any project-specific build output
          directories, generated files, or secret file patterns are added.
          The .env file must be listed. Only .env.example is committed.

        .env.example
          List every environment variable the project needs, with placeholder
          values (no real secrets). Derive keys from:
            plan.md §14 local_dev_setup.environment_variables
            any infrastructure URLs from project-brief.md
          Format: KEY=placeholder_value (one per line, no blank lines between entries).
          Commit this file. Do NOT commit .env or .env.local.

        CLAUDE.md (update, advisory max 100 lines):
          Use ddd-clean-arch/templates/claude-md-template.md as the structure.
          Fill in every placeholder from plan.md:
            [PROJECT_NAME]       → from project-brief.md Project name
            What this is         → from §1 requirements scope + out_of_scope
            Stack                → from project-brief.md stack fields + §13 api_testing_tool + e2e_testing_tool
            Architecture         → from §6 modules + future_extraction_candidates
            Module boundaries    → from §6 modules (owns + does_not_own per module)
            Ubiquitous language  → from §2 + §4 (aggregate roots, events, value objects, repos)
            What NOT to do       → from §16 verbatim (all 10 constraints, do not paraphrase)
            Test conventions     → from §13 (all frameworks, locations, runners)
            Regression commands  → from §13 regression_command (all three)
            Definition of done   → from §17 verbatim
          Target ≤100 lines. This is advisory — do not cut §16 or §17.
          If the file exceeds 100 lines, condense the Architecture and Module
          boundaries sections, but never omit §16 or §17.

        scripts/ci-local.sh (fill in the COMMANDS section):
          Populate the command variables at the top of scripts/ci-local.sh
          using the values from plan.md §13 and §14:
            SECRET_SCAN_CMD: see ci-local.sh COMMANDS section (default: gitleaks detect --source . --redact -q)
            LINT_CMD: from §14 task_runner.lint
            ARCH_TEST_CMD: construct from §20 backend_arch_tool (e.g. if ArchUnit → ./gradlew test --tests ArchitectureTest; if dependency-cruiser → dc --config .dependency-cruiser.cjs) + frontend arch:check
            UNIT_TEST_CMD: from §13 regression_command.api_only (includes unit tests)
            INTEGRATION_TEST_CMD: from §13 regression_command.api_only (includes integration tests)
            API_TEST_CMD: from §13 api_testing_tool.runner
            CONTRACT_TEST_CMD: from §13 regression_command.contract_only (or leave empty if not defined)
            E2E_TEST_CMD: from §13 regression_command.e2e_only

        .specify/memory/conventions.md
          Naming: use cases, repositories, events, value objects, test classes.
          Method conventions: execute signature, factory vs constructor.
          Error handling conventions per layer.
          Frontend: component, hook, type naming. Error surface per error type.
          Shared: commit format, TODO format.
          Decision log section (empty — grows via /speckit.review).

        End with: "Plan DevEx (gitignore, CLAUDE.md, ci-local.sh, conventions) complete."

  # ── CLAUDE.md LINE COUNT (advisory, soft warning) ───────────────
  # Previously a hard cap at 150 lines. Converted to advisory at 100 lines
  # to prevent Claude from paraphrasing or omitting essential content.
  - id: check-claude-md-lines
    type: shell
    command: "bash scripts/check-claude-md-lines.sh --hard"

  # ── VALIDATE CI-LOCAL.SH COMMANDS POPULATED ──────────────────
  - id: validate-ci-local
    type: shell
    command: "bash scripts/validate-ci-local-cmds.sh"
 
  - id: review-ci-local
    type: gate
    message: |
      Review the ci-local.sh command validation above.
      If FAIL: go back to plan-devex or fill commands manually.
      If PASS: proceed to plan review.
    options: [approve, revise, abort]
    on_revise:
      - goto: plan-devex
    on_abort:
      - id: cleanup-abort-spec-devex
        type: shell
        command: >
          bash scripts/cleanup-abandoned-state.sh
          "$(bash scripts/find-first-feature.sh)"
          "spec_devex"
      - goto: abort

  # ── BOUNDED PLAN REVIEW ─────────────────────────────────────────
  # Replaces the unbounded review-plan-consolidated-gate.
  # Max 3 revisions prevent infinite revise cycles.
  - id: plan_review_revision
    type: while
    condition: "true"
    max_iterations: 3
    steps:
      - id: plan-consolidated-review
        type: prompt
        command: speckit.plan
        integration: claude
        input:
          args: >
            REVISION CONTEXT: If .specify/specs/[feature]/revision_history.md exists,
            read it. Do not repeat fixes that were already tried and rejected.
            Read only the last 3 entries.

            Use targeted reading per the spec-sections mapping
            (templates/spec-sections.md). Read only plan.md sections
            relevant to the items being verified. Do not read plan.md end-to-end.

            For SECTION 1 (plan.md §1-§16): read each section referenced
            by the checklist items you are verifying.
            For SECTION 2 (companion files):
              Read api-contract.yaml only for endpoints referenced in §8
              Read data-model.sql only for tables referenced in §12
            For SECTION 3 (DevEx files):
              Read CLAUDE.md and scripts/ci-local.sh in full
              Read .specify/memory/conventions.md in full

            Run the CONSOLIDATED REVIEW CHECKLIST below. For each section,
            verify all items. Report PASS/FAIL/N/A per item.
            SECTION 4 (Design Quality) is new (I5 fix) — run all 5 dimensions.

            ═══════════════════════════════════════════════════════════════
            SECTION 1: plan.md §1–§16
            ═══════════════════════════════════════════════════════════════
            [§2] Ubiquitous language: exact names you want in code?
            [§4] Aggregates: invariants correct? Concurrency strategy per aggregate? Idempotency?
            [§7] Error taxonomy: four types defined? Envelope shape correct?
            [§8] API: every endpoint present? Auth correct? Token delivery? CORS?
            [§9] CSP: connect-src includes API origin? Consistent with token delivery?
            [§10] End-to-end budget realistic? Backend p95 derived from it?
            [§11] Correlation ID matches §8? Health checks OK? Circuit breakers external only?
            [§12] Tables match §4 aggregates? Indexes name use cases? Teardown scripts?
            [§13] api_testing_tool correct? Three regression commands? E2E coverage? Test data strategy?
            [§14] local_dev_setup runnable in under 15 min?
            [§15] 10 domain-specific failure scenarios with detection/response/recovery?
            [§16] Exactly 10 constraints, specific to this codebase with consequence?

            ═══════════════════════════════════════════════════════════════
            SECTION 2: Companion files
            ═══════════════════════════════════════════════════════════════
            [api-contract.yaml] All §8 endpoints with correct HTTP methods and paths?
            [api-contract.yaml] Error envelope as $component referenced everywhere?
            [api-contract.yaml] CORS + token delivery in top comment block?
            [api-contract.yaml] Cache-control headers on cacheable endpoints?
            [data-model.sql] Schema matches §12 tables and column types?
            [data-model.sql] Each table has aggregate + bounded context comment?
            [data-model.sql] Each index names its supporting use case?
            [data-model.sql] Teardown SQL included for test DB setup?
            [backend-interfaces] Signatures match §4? Zero infra imports?
            [frontend-interfaces] Result<T,E> returns? Error tags match §7?
            [frontend-interfaces] One typed function per §8 endpoint?

            ═══════════════════════════════════════════════════════════════
            SECTION 3: DevEx files
            ═══════════════════════════════════════════════════════════════
            [CLAUDE.md] ≤150 lines? All template sections filled? §16 verbatim?
            [.gitignore] .env listed? Project-specific patterns added?
            [ci-local.sh] All command variables populated from plan.md?
            [ci-local.sh] §9: secret_scanning.ci_gate is yes? .gitleaks.toml referenced?
            [conventions.md] Naming patterns filled in for this stack?

            ═══════════════════════════════════════════════════════════════
            SECTION 4: Design Quality (I5 — merged from design_review_round)
            ═══════════════════════════════════════════════════════════════
            [Ubiquitous Language] Do all class/method/event names match §2?
            [Invariant Enforcement] Are aggregate invariants enforced at construction?
            [Hidden Coupling] Any shared mutable state between bounded contexts?
            [Conventions Consistency] Error envelope, correlation ID, Result<T,E> used everywhere?
            [Readability] Can a new developer understand the architecture in <30 min?
            Report any violations with file:line references.
            For blocking findings: fix immediately.
            ═══════════════════════════════════════════════════════════════

            For any FAIL: fix the issue immediately. Do not proceed until all
            items are PASS. Print a summary of all sections at the end.
            End with: "Consolidated plan review complete. All sections PASS."

      - id: check_plan_threshold
        type: shell
        command: "bash scripts/gate-threshold.sh plan {{ steps.plan_review_revision_iteration.output.count || 1 }}"

      - id: review-plan-revision-gate
        type: gate
        message: |
          ━━ PLAN REVIEW REVISION {{ steps.plan_review_revision_iteration.output.count || 1 }}/3 ━━

          Review all 4 sections. Approve to continue implementation.
          Revise to send back for changes ({{ steps.plan_review_revision_iteration.output.count || 1 }}/3 used).
          {% if steps.check_plan_threshold.output.AUTO_APPROVE == 'true' %}
          **Revision threshold exceeded**. Approving on next iteration.
          {% endif %}
        options: [approve, revise, abort]
        on_revise:
          - id: record-and-trim-plan
            type: shell
            command: >
              bash scripts/record-and-trim.sh plan_review_revision
              "{{ steps.plan_review_revision_iteration.output.count || 1 }}"
          - goto: plan-consolidated-review
        on_abort:
          - id: cleanup-abort-plan-review
            type: shell
            command: >
              bash scripts/cleanup-abandoned-state.sh
              "$(bash scripts/find-first-feature.sh)"
              "plan_review"
          - goto: abort

  # ── BOUNDED DESIGN REVIEW ─────────────────────────────────────
  # I5: Merged into plan_review_revision as SECTION 4.
  # The plan review loop now has 2 sub-rounds per iteration:
  #   SECTION 1-3: Structural checklist (plan completeness, companion files, DevEx)
  #   SECTION 4:   Design quality (5 dimensions from speckit.review)
  # Cap at 3 rounds TOTAL (not 3 per sub-round) to reduce cost.
  # This section is kept for reference but is now a no-op — the design
  # review runs as SECTION 4 within plan_review_revision.
  - id: design_review_round
    type: while
    condition: "false"
    max_iterations: 0
    steps: []

  # ── PHASE 4: TASKS ─────────────────────────────────────────────
  # Tasks phase runs in a loop with max 5 revisions to prevent
  # infinite revise-validate-tasks cycles (circular deps, etc.).
  - id: tasks_phase
    type: while
    condition: "true"
    max_iterations: 5
    steps:

      - id: tasks
        command: speckit.tasks
        integration: claude
        input:
          args: >
            REVISION CONTEXT: If .specify/specs/[feature]/revision_history.md exists,
            read it. Do not repeat fixes that were already tried and rejected.

            Read plan.md and use ddd-clean-arch/templates/tasks-template.md.

            Produce one task per aggregate (domain layer), one per aggregate
            (infra layer), one per endpoint group (api layer), then shared,
            then integration tasks, then frontend-data, frontend-feature, e2e —
            in that order.

            AFTER producing shared/frontend-data/frontend-feature/e2e tasks,
            read plan.md §3 (Bounded contexts). For each bounded context relationship
            (shared kernel, ACL, open host service, publisher-subscriber),
            produce an integration task:

              ## TASK-[N]
              Title: [Context A] → [Context B] integration
              Type: integration
              Depends on: [all domain + infra + api tasks for both contexts]
              Scope:
                Creates:
                  - tests/integration/[contextA]_[contextB]_IntegrationTest.[ext]
                Modifies:
                  - none
              Acceptance criteria:
                - [Test verifies that an event/command from Context A correctly
                  triggers the expected behavior in Context B through the ACL/shared kernel]
              Do NOT:
                - [Do not implement domain logic — only write the integration test]

            Task order must be:
              1. backend-domain → 2. backend-infra → 3. backend-api →
              4. shared → 5. integration (cross-context) →
              6. frontend-data → 7. frontend-feature → 8. e2e

            Rules:
              - Acceptance criteria must name exact classes from plan.md.
                Form: "calling [ExactClass].[method]([input]) raises/returns [output]"
              - Each task has exactly one "Do NOT" scope-creep guard.
              - Max 5 files and max 1 aggregate per task.
              - All Depends-on fields must reference earlier tasks.
              - No circular dependencies.

      - id: check_tasks_threshold
        type: shell
        command: "bash scripts/gate-threshold.sh tasks {{ steps.tasks_phase_iteration.output.count || 1 }}"

      - id: review-tasks
        type: gate
        message: |
          Review .specify/specs/[feature]/tasks.md

          [ ] Task order: domain → infra → api → shared → integration → frontend-data → frontend-feature → e2e
          [ ] Integration tasks: one per bounded context relationship (shared kernel, ACL, publisher-subscriber)?
          [ ] Acceptance criteria verifiable (name exact classes/methods from plan.md)?
          [ ] Each "Do NOT" guard is specific to that task?
          [ ] No task touches more than 5 files or more than 1 aggregate?
          [ ] All Depends-on references are to earlier tasks?

          Approving proceeds to task dependency graph validation before implementation.
          {% if steps.check_tasks_threshold.output.AUTO_APPROVE == 'true' %}
          **Revision threshold exceeded**. Approving on next iteration.
          {% endif %}
        options: [approve, revise]
        on_revise:
          - id: record-and-trim-tasks
            type: shell
            command: >
              bash scripts/record-and-trim.sh tasks_phase
              "{{ steps.tasks_phase_iteration.output.count || 1 }}"
          - goto: tasks

      - id: validate-tasks
        type: shell
        command: "bash scripts/validate-tasks.sh"

      - id: check_validate_tasks_threshold
        type: shell
        command: "bash scripts/gate-threshold.sh tasks {{ steps.tasks_phase_iteration.output.count || 1 }}"

      - id: review-validate-tasks
        type: gate
        message: |
          Review the task dependency graph validation results above.

          ERRORS must be fixed before implementation starts:
            - Circular dependencies
            - References to non-existent tasks

          WARNINGS are advisory:
            - Task ordering issues (depends-on appears after dependent task)

          If there are errors, select "revise" to fix tasks.md.
          If clean, select "approve" to start implementation.
          Maximum 5 revision cycles ({{ steps.tasks_phase_iteration.output.count || 1 }}/5).
          {% if steps.check_validate_tasks_threshold.output.AUTO_APPROVE == 'true' %}
          **Revision threshold exceeded**. Approving on next iteration.
          {% endif %}
        options: [approve, revise, abort]
        on_abort:
          - id: cleanup-abort-tasks
            type: shell
            command: >
              bash scripts/cleanup-abandoned-state.sh
              "$(bash scripts/find-first-feature.sh)"
              "tasks_phase"
          - goto: abort
        on_revise:
          - id: record-and-trim-validation
            type: shell
            command: >
              bash scripts/record-and-trim.sh validation_revision
              "{{ steps.tasks_phase_iteration.output.count || 1 }}"
          - goto: tasks

  # ── TRACEABILITY CHECK (before implement_loop) ────────────────
  # Ensures every task traces back to a spec requirement.
  # If gaps found, revise tasks.md before implementation starts.
  # Removed ignore_failure: true — traceability is a quality gate, not advisory.
  - id: traceability_check
    type: shell
    command: >
      bash scripts/traceability-check.sh
      "$(bash scripts/find-first-feature.sh)"

  # ── Issue L: Cost estimate after plan phase ──────────────────
  # Show estimated cost when task count is known (after tasks phase).
  # Helps users understand API cost before entering the expensive
  # implement loop. Uses estimate-cost.sh which was previously
  # unused (Issue L from review).
  - id: show_cost_estimate
    type: shell
    command: >
      bash scripts/estimate-cost.sh
      "$(bash scripts/find-first-feature.sh)"

  - id: review_traceability
    type: gate
    message: |
      Traceability check results:
      {% if steps.traceability_check.output.TRACEABLE == 'false' %}
      **GAPS DETECTED** ({{ steps.traceability_check.output.TRACE_GAP_COUNT || 0 }} gap(s)):
      {{ steps.traceability_check.output.TRACE_GAPS || "See stderr above." }}
      Fix tasks.md to close gaps, then revise.
      {% else %}
      All tasks traceable to plan.md. No gaps detected.
      {% endif %}
    options: [approve, revise, abort]
    on_revise:
      - goto: tasks
    on_abort:
      - id: cleanup-on-abort-traceability
        type: shell
        command: >
          bash scripts/cleanup-abandoned-state.sh
          "$(bash scripts/find-first-feature.sh)"
          "traceability_check"
      - goto: abort

  # ── Fix 10: Auto-derive routing tables from checks[].tier ─────
  # Runs after plan is complete, before implementation starts.
  # Derives routing_critical and routing_secondary from the single
  # source of truth: checks[].tier + checks[].applies_to.
  - id: derive_routing
    type: shell
    command: >
      bash scripts/derive-routing-tables.sh --write
      "$(cd "$(dirname "$0")" && pwd)/ddd-clean-arch/preset.yml"

  # ── PHASE 5: IMPLEMENT LOOP (DAG-structured) ──────────────────
  # Linear flow: no goto jumps within the iteration.
  # Each step flows to the next. Loops are handled by the while wrapper.
  # Issue C: Dynamic iteration limit — max(50, total_tasks * 2).
  #   Gives room for revision retries on large projects without
  #   infinite loops. The condition checks has_todo and revision exhaustion.
  # Uses check-tasks-safe.sh which returns safe defaults if tasks.md is malformed.
  - id: implement_loop
    type: while
    condition: >
      {{ steps.check_remaining.output.has_todo == 'true' }} and
      {{ steps.check_revisions_dry.output.REVISION_EXHAUSTED != 'true' }}
    max_iterations: >
      {{ (steps.check_remaining.output.total_tasks | int) * 2 > 50
         ? (steps.check_remaining.output.total_tasks | int) * 2
         : 50 }}
    steps:

      # ── PHASE 1: TASK STATE ──────────────────────────────────
      - id: check_remaining
        type: shell
        command: "bash scripts/check-tasks-safe.sh"

      # ── Fix 2: Snapshot before each task ──────────────────────
      # Creates a file hash snapshot for rollback on verification failure.
      # continue_on_error: true — workflow doesn't break if git is unavailable.
      - id: pre_task_snapshot
        type: shell
        command: >
          bash scripts/check-point.sh snapshot
          "{{ steps.check_remaining.output.feature_dir }}"
          "{{ steps.check_remaining.output.todo_task_id || 'unknown' }}"
          "{{ steps.check_remaining.output.feature_dir }}/../.."
        continue_on_error: true

      # ── Fix 5: Spec revision limit check ──────────────────────
      # Prevents infinite spec-revise loops. Default max is 2.
      - id: check_spec_revision_limit
        type: shell
        command: >
          bash scripts/check-spec-revisions.sh --dry-run
          "{{ steps.check_remaining.output.feature_dir }}"

      # ── Issue J: Handle spec_revision tasks ───────────────────
      # If the current task is a spec_revision type, route to
      # speckit.spec-revise instead of the normal implement flow.
      # Only runs if spec revisions haven't been exhausted.
      - id: check_spec_revision
        type: if
        condition: >
          {{ steps.check_remaining.output.todo_task_type == 'spec_revision' }} and
          {{ steps.check_spec_revision_limit.output.SPEC_REVISION_EXHAUSTED != 'true' }}
        then:
          - id: run_spec_revise
            type: prompt
            command: speckit.spec-revise
            integration: claude
            input:
              args: >
                This is a spec_revision task — the spec was discovered to be
                wrong during implementation.
                Read pending-learnings.md, identify spec corrections needed,
                create/update plan.md and spec.md, and add fix tasks if needed.
                After revision, the implement loop will re-process affected tasks.
          # ── Fix 5: Increment spec revision counter ──────────────
          - id: record_spec_revision
            type: shell
            command: >
              bash scripts/check-spec-revisions.sh
              "{{ steps.check_remaining.output.feature_dir }}"
          - id: validate_spec_revision_fixes
            type: shell
            command: >
              bash scripts/validate-fix-tasks.sh
              "{{ steps.check_remaining.output.feature_dir }}"
          # No goto — iteration continues; next while iteration picks up
          # the next task (which may be a re-implemented task)

      - id: check_iteration_cleanup
        type: if
        condition: "{{ steps.implement_loop_iteration.output.count || 1 }} == 25 or {{ steps.implement_loop_iteration.output.count || 1 }} == 40"
        then:
          - id: cleanup_artifacts
            type: shell
            command: >
              bash scripts/cleanup-artifacts.sh
              "{{ steps.check_remaining.output.feature_dir }}"
              "{{ steps.implement_loop_iteration.output.count || 1 }}"

      # ── Parse Error ──
      - id: check_parse_error
        type: if
        condition: "{{ steps.check_remaining.output.TASKS_PARSE_ERROR == '1' }}"
        then:
          - id: parse_error_gate
            type: gate
            message: |
              ⚠ Task tracking is BROKEN — check-tasks.sh failed to parse tasks.md.

              The workflow cannot safely determine task state.
              Manual inspection of tasks.md is required before continuing.

              Options:
                fix — Edit tasks.md to fix formatting, then restart the workflow.
                abort — Cancel the workflow.
            options: [fix, abort]
            on_abort:
              - id: cleanup-on-abort-parse
                type: shell
                command: >
                  bash scripts/cleanup-abandoned-state.sh
                  "{{ steps.check_remaining.output.feature_dir }}"
                  "parse_error"
              - goto: abort

      # ── All Done ──
      - id: check_all_done
        type: if
        condition: "{{ steps.check_remaining.output.has_todo == 'false' }}"
        then:
          - id: all_tasks_done_summary
            type: shell
            command: >
              bash scripts/log-impl-complete.sh
              "{{ steps.check_remaining.output.done_count }}"
              "{{ steps.check_remaining.output.total_tasks }}"
              "{{ steps.check_remaining.output.abandoned_count | int }}"
          - id: post_impl_drift_check
            command: speckit.check
            integration: claude
            input:
              args: >
                Run a lightweight constraint drift check.
                Check only constraint drift for the 3 most common violation
                patterns from quick-drift-check.sh:
                  1. Layer rule violations
                  2. Missing correlation ID
                  3. Test data isolation violations
                Report PASS/FAIL for each. If any FAIL: note it but do not block.
                Write findings to .artifacts/post-implementation-drift.md.
                This is advisory — the full speckit.verify will run in Phase 8.

      # ── Stagnation Detection ──
      - id: stagnation_check_run
        type: shell
        command: >
          bash scripts/check-stagnation.sh
          "{{ steps.check_remaining.output.feature_dir }}"
          "{{ steps.check_remaining.output.done_count }}"
          "{{ steps.check_remaining.output.total_tasks }}"

      - id: stagnation_gate
        type: if
        condition: "{{ steps.stagnation_check_run.output.STAGNANT == 'true' }}"
        then:
          - id: stagnation_review
            type: gate
            message: |
              ⚠ IMPLEMENTATION STAGNATION DETECTED

              No new tasks completed for {{ steps.stagnation_check_run.output.CONSECUTIVE_NO_PROGRESS }} consecutive iterations.
              Tasks may be blocked, flaky, or the spec may be unrealistic.
              {% if steps.stagnation_check_run.output.CONSECUTIVE_CONTINUES | int >= 2 %}
              **Continue option exhausted** ({{ steps.stagnation_check_run.output.CONSECUTIVE_CONTINUES }} consecutive continues).
              You must troubleshoot or abort.
              {% endif %}

              Options:
                continue — Force-continue (risk wasting iterations).
                troubleshoot — Run /speckit.status to diagnose, then decide.
                abort — Cancel the workflow for manual review.
              {% if steps.stagnation_check_run.output.REVISION_ONLY == 'true' %}
              **Revision loop detected** — revising without completing tasks.
              **Recommended: Select "troubleshoot" or "abort".**
              Continuing a revision loop wastes iterations.
              {% endif %}
            options: [continue, troubleshoot, abort]
            on_continue:
              - id: increment_stagnation_continue
                type: shell
                command: >
                  bash scripts/check-stagnation.sh --increment-continue
                  "{{ steps.check_remaining.output.feature_dir }}"
              - id: reset_stagnation_on_continue
                type: shell
                command: >
                  bash scripts/check-stagnation.sh --reset
                  "{{ steps.check_remaining.output.feature_dir }}"
            on_troubleshoot:
              - id: status_diagnose
                command: speckit.status
                integration: claude
              - id: speckit_context_load
                command: speckit.context
                integration: claude
                input:
                  args: >
                    Load focused context for the stuck task.
                    Read tasks.md, identify the IN_PROGRESS or first TODO task.
                    Read plan.md sections relevant to that task.
                    Produce a targeted context window: task scope, acceptance
                    criteria, relevant plan sections, and any error history.
              - id: resume_from_troubleshoot
                type: shell
                command: >
                  bash scripts/reset-stagnation.sh
                  "{{ steps.check_remaining.output.feature_dir }}"
            on_abort:
              - id: cleanup-on-abort-stagnation
                type: shell
                command: >
                  bash scripts/cleanup-abandoned-state.sh
                  "{{ steps.check_remaining.output.feature_dir }}"
                  "stagnation"
              - goto: abort

      # ── Progress Logging ──
      - id: iteration_progress
        type: shell
        command: >
          bash scripts/log-iteration-progress.sh
          "{{ steps.implement_loop_iteration.output.count || 1 }}"
          "{{ steps.check_remaining.output.done_count }}"
          "{{ steps.check_remaining.output.total_tasks }}"
          "{{ steps.check_remaining.output.todo_count }}"
          "{{ steps.check_remaining.output.in_progress || 'none' }}"

      # ── Interrupted Session Recovery ──
      # No goto on actions — iteration flows naturally to next step.
      # on_restart: marks task TODO; iteration continues (next while iteration picks up the task)
      # on_continue: falls through to next step
      # on_abandon: marks task ABANDONED; iteration continues
      - id: check_in_progress
        type: if
        condition: "{{ steps.check_remaining.output.in_progress != '' }}"
        then:
          - id: resolve_in_progress
            type: gate
            message: |
              ⚠ IN_PROGRESS task(s) detected from a previous interrupted session:
                {{ steps.check_remaining.output.in_progress }}
              {% if steps.check_remaining.output.in_progress_all != '' and steps.check_remaining.output.in_progress_all != steps.check_remaining.output.in_progress %}
              Additional IN_PROGRESS tasks: {{ steps.check_remaining.output.in_progress_all }}
              {% endif %}

              A previous session was interrupted before this task completed.
              The task may have partial files on disk.

              Choose how to proceed:
                restart  — Mark the task TODO and restart it cleanly.
                continue — Leave it IN_PROGRESS and attempt to resume.
                abandon  — Mark it ABANDONED and skip to the next TODO task.
            options: [restart, continue, abandon]
            on_restart:
              - id: validate-deps
                type: shell
                command: >
                  bash scripts/validate-task-deps.sh
                  "{{ steps.check_remaining.output.feature_dir }}/tasks.md"
                  "{{ steps.check_remaining.output.in_progress }}"
              - id: restart-all
                type: shell
                command: >
                  bash scripts/resolve-all-in-progress.sh
                  "{{ steps.check_remaining.output.feature_dir }}/tasks.md"
                  TODO "Crash recovery — restarted all IN_PROGRESS tasks"
              # No goto — iteration continues; next while iteration picks up the task
            on_abandon:
              type: shell
              command: >
                bash scripts/resolve-all-in-progress.sh
                "{{ steps.check_remaining.output.feature_dir }}/tasks.md"
                ABANDONED "Crash recovery — abandoning all IN_PROGRESS tasks with cascade"
            # on_continue: no action — falls through

      # ── Abandoned Task Warning ──
      - id: check_abandoned
        type: if
        condition: "{{ steps.check_remaining.output.abandoned_count | int > 0 }}"
        then:
          - id: warn_abandoned
            type: gate
            message: |
              ⚠ {{ steps.check_remaining.output.abandoned_count }} ABANDONED task(s) found.
              Approve to continue. Revise to clean up abandoned tasks.
            options: [approve, revise]
            on_revise:
              - id: clean-abandoned-tasks
                type: prompt
                integration: claude
                input:
                  args: >
                    Read tasks.md. For each ABANDONED task, either delete the
                    task section or reset its status to TODO. Print a summary.
              # No goto — iteration continues; next while iteration re-checks

      # ── PHASE 2: PRE-IMPLEMENT VALIDATION ────────────────────
      - id: check_revisions_dry
        type: shell
        command: >
          bash scripts/check-task-revisions.sh
          --dry-run
          --auto
          "{{ steps.check_remaining.output.feature_dir }}"
          "3"

      - id: pre_task_validation
        type: shell
        command: >
          bash scripts/pre-task-validate.sh
          "{{ steps.check_remaining.output.feature_dir }}"

      # ── Prompt Context Generation ──
      - id: generate_prompt_context
        type: shell
        command: >
          bash scripts/prompt-context.sh "{{ steps.check_remaining.output.feature_dir }}"

      # ── PHASE 3A: WRITE FAILING TESTS (TDD red phase) ──────────
      - id: write_test
        type: prompt
        command: speckit.write-test
        integration: claude
        input:
          args: >
            Discover the current batch: find all TODO tasks whose Depends-on
            tasks are all DONE. Process each task in the batch sequentially
            (write tests for TASK-N, then TASK-N+1, etc.). After processing
            all tasks in the batch, write the batch task list to
            .artifacts/batch_tasks.txt (format: "TASK-1, TASK-2, ...") and
            print "Batch complete: [N] tasks done."
            If no batch can be formed (no TODO tasks with all deps met), stop.
            Always check Depends-on before starting each task.
            Use the prompt context at .artifacts/prompts/[task_id]/context.md
            if available — it contains targeted plan sections for this task.

      # ── PHASE 3B: IMPLEMENT TO MAKE TESTS PASS ─────────────────
      - id: implement
        type: prompt
        command: speckit.implement
        integration: claude
        input:
          args: >
            Implement the code to make the tests written by the previous step pass.
            If .artifacts/batch_tasks.txt exists (batch mode from write-test):
              implement each task in the batch sequentially.
              After the batch, remove .artifacts/batch_tasks.txt.
            Otherwise: implement only the first TODO task.
            Always check Depends-on before starting.

      - id: implement_verify
        type: prompt
        command: speckit.implement-verify
        integration: claude
        input:
          args: >
            Continue from the just-completed implementation.
            Run quality checks (STEP 3) and produce the completion report (STEP 4).
            Do NOT re-implement — only verify and report.

      # ── Issue I: Lightweight drift check on EVERY task (not just periodic) ─
      # This runs after every task completion. It's a fast heuristic check
      # (3 patterns) that catches the most common violations early.
      # The full check Z still runs at retro intervals for comprehensive review.
      - id: per_task_drift_check
        type: if
        condition: "{{ steps.check_remaining.output.todo_count | int }} > 0"
        then:
          - id: run_quick_drift
            type: shell
            command: >
              bash scripts/quick-drift-check.sh
              "{{ steps.check_remaining.output.feature_dir }}" || true

      # ── Post-batch consistency (after parallel batches) ─────────
      # Lightweight check for constraint drift + API surface consistency
      # after a parallel batch completes. Only runs when there are still
      # TODO tasks remaining (batch was processed, not final batch).
      - id: post_batch_consistency
        type: if
        condition: >
          {{ steps.check_remaining.output.todo_count | int }} > 0 and
          {{ steps.check_remaining.output.abandoned_count | int }} == 0
        then:
          - id: run_batch_consistency
            type: prompt
            command: speckit.batch-consistency
            integration: claude
            input:
              args: >
                Run post-batch consistency check.
                Read the batch task list from .artifacts/batch_tasks.txt.
                This is lightweight — check only constraint drift and API surface.
                If .artifacts/batch_tasks.txt does not exist, skip silently.

      # ── Post-batch merge/conflict detection ────────────────
      # Verifies no merge conflicts or unexpected overlaps after parallel batches.
      - id: post_batch_merge_check
        type: if
        condition: >
          {{ steps.check_remaining.output.todo_count | int }} > 0 and
          {{ steps.check_remaining.output.abandoned_count | int }} == 0
        then:
          - id: run_merge_check
            type: shell
            command: >
              bash scripts/verify-batch-consistency.sh
              "{{ steps.check_remaining.output.feature_dir }}"

      - id: post_verify_checkpoint
        type: shell
        command: >
          bash scripts/post-verify-checkpoint.sh
          "{{ steps.check_remaining.output.feature_dir }}"

      - id: increment_revision
        type: shell
        command: >
          bash scripts/check-task-revisions.sh
          "{{ steps.check_remaining.output.feature_dir }}"
          "{{ steps.check_remaining.output.todo_task_id || 'unknown' }}"
          "3"

      # ── PHASE 4: REVIEW GATES ────────────────────────────────
      - id: check_implement_threshold
        type: shell
        command: "bash scripts/gate-threshold.sh implement {{ steps.implement_loop_iteration.output.count || 1 }}"

      - id: pre_gate_acceptance
        type: shell
        command: >
          bash scripts/check-gate-preconditions.sh
          "{{ steps.check_remaining.output.feature_dir }}" "acceptance"

      - id: review-acceptance
        type: if
        condition: >
          {{ steps.pre_gate_acceptance.output.AUTO_APPROVE == 'true' }} and
          {{ steps.pre_gate_acceptance.output.GATE_BLOCKED == 'false' }} and
          {{ steps.pre_gate_acceptance.output.GATE_FORCE_HUMAN == 'false' }}
        then:
          - id: accept-acceptance-auto
            type: shell
            command: "echo 'Acceptance gate auto-approved (all deterministic checks passed)'"
        else:
          - id: review-acceptance-gate
            type: gate
            message: |
              Review acceptance criteria for the last task.

              [ ] All acceptance criteria satisfied (test name + file:line references)?
              [ ] Test file committed alongside implementation?

              {% if steps.pre_gate_acceptance.output.GATE_BLOCKED == 'true' %}
              **BLOCKED** — Failing deterministic checks: {{ steps.pre_gate_acceptance.output.FAILING_CHECKS }}
              You MUST revise. Approval is disabled until checks pass.
              {% endif %}
              {% if steps.check_implement_threshold.output.AUTO_APPROVE == 'true' %}
              **Revision threshold exceeded**. You MUST revise.
              {% endif %}
            options: [approve, revise]
            on_revise:
              - id: revise-mark-in-progress-acceptance
                type: shell
                command: >
                  bash scripts/lock-task-write.sh
                  "{{ steps.check_remaining.output.feature_dir }}/tasks.md"
                  IN_PROGRESS
                  "{{ steps.check_remaining.output.todo_task_id || 'unknown' }}"
                  "Task sent back for revision — acceptance criteria not met."
              # No goto — iteration ends naturally; next while iteration re-implements

      - id: pre_gate_checks
        type: shell
        command: >
          bash scripts/check-gate-preconditions.sh
          "{{ steps.check_remaining.output.feature_dir }}" "quality"

      - id: review-checks
        type: if
        condition: >
          {{ steps.pre_gate_checks.output.AUTO_APPROVE == 'true' }} and
          {{ steps.pre_gate_checks.output.GATE_BLOCKED == 'false' }} and
          {{ steps.pre_gate_checks.output.GATE_FORCE_HUMAN == 'false' }}
        then:
          - id: accept-checks-auto
            type: shell
            command: "echo 'Quality checks gate auto-approved (all deterministic checks passed)'"
        else:
          - id: review-checks-gate
            type: gate
            message: |
              Review quality check results for the last task.

              [ ] All applicable checks passed (all checks in routing table)?
              [ ] Check [BC] new tests + regression: zero new failures in existing test suite?
              [ ] Check [J] performance budget: within §10 budget?
              [ ] Check [K] contract enforcement: API matches api-contract.yaml?
              [ ] Spec learnings reviewed — confirmed or rejected each proposed change?

              {% if steps.pre_gate_checks.output.GATE_BLOCKED == 'true' %}
              **BLOCKED** — Failing deterministic checks: {{ steps.pre_gate_checks.output.FAILING_CHECKS }}
              You MUST revise. Approval is disabled until checks pass.
              {% endif %}
              {% if steps.check_implement_threshold.output.AUTO_APPROVE == 'true' %}
              **Revision threshold exceeded**. You MUST revise.
              {% endif %}
            options: [approve, revise]
            on_revise:
              - id: revise-mark-in-progress-checks
                type: shell
                command: >
                  bash scripts/lock-task-write.sh
                  "{{ steps.check_remaining.output.feature_dir }}/tasks.md"
                  IN_PROGRESS
                  "{{ steps.check_remaining.output.todo_task_id || 'unknown' }}"
                  "Task sent back for revision — quality checks not met."
              # No goto — iteration ends naturally; next while iteration re-implements

      - id: pre_gate_tdd
        type: shell
        command: >
          bash scripts/check-gate-preconditions.sh
          "{{ steps.check_remaining.output.feature_dir }}" "tdd"

      - id: review-tdd
        type: if
        condition: >
          {{ steps.pre_gate_tdd.output.AUTO_APPROVE == 'true' }} and
          {{ steps.pre_gate_tdd.output.GATE_BLOCKED == 'false' }} and
          {{ steps.pre_gate_tdd.output.GATE_FORCE_HUMAN == 'false' }}
        then:
          - id: accept-tdd-auto
            type: shell
            command: "echo 'TDD gate auto-approved (all deterministic checks passed)'"
        else:
          - id: review-tdd-gate
            type: gate
            message: |
              Review TDD integrity for the last task.

              [ ] Test audit: STEP 1.5 report produced with name→criteria mapping?
              [ ] Test audit: no trivial assertions or over-masking found?
              [ ] Test correctness: each test name proves its acceptance criterion?
              [ ] Test correctness: [BC] new tests PASS with correct assertions?
              [ ] Test correctness: factory/fixture used for test data isolation?
              [ ] Red phase: failure evidence captured before implementation?
              [ ] Hardening: catastrophic scenarios addressed for highest_risk_paths?

              {% if steps.pre_gate_tdd.output.GATE_BLOCKED == 'true' %}
              **BLOCKED** — Failing deterministic checks: {{ steps.pre_gate_tdd.output.FAILING_CHECKS }}
              You MUST revise. Approval is disabled until checks pass.
              {% endif %}
              {% if steps.check_implement_threshold.output.AUTO_APPROVE == 'true' %}
              **Revision threshold exceeded**. You MUST revise.
              {% endif %}

              Approve to continue to the next task.
              Revise to send the task back for fixes.
              Pause to save state and stop (resume with: bash scripts/resume-workflow.sh)
            options: [approve, revise, stop]
            on_stop:
              type: shell
              command: >
                bash scripts/save-pause-state.sh
                "{{ steps.check_remaining.output.feature_dir }}"
                "review-tdd"
            on_revise:
              - id: revise-mark-in-progress-tdd
                type: shell
                command: >
                  bash scripts/lock-task-write.sh
                  "{{ steps.check_remaining.output.feature_dir }}/tasks.md"
                  IN_PROGRESS
                  "{{ steps.check_remaining.output.todo_task_id || 'unknown' }}"
                  "Task sent back for revision — TDD integrity issues."
              # No goto — iteration ends naturally; next while iteration re-implements

      # ── PHASE 5: PERIODIC CHECKS (retro + drift + traceability) ─
      # Runs every 5 tasks (when retro_trigger is true).
      # Flattened structure: traceability moved to END so the loop
      # naturally restarts when user selects "revise" (no goto needed).
      - id: retro_drift_check
        type: if
        condition: "{{ steps.check_remaining.output.retro_trigger == 'true' }}"
        then:

          # ── Reset drift revision counter for new cycle ─────────
          - id: reset_drift_revisions
            type: shell
            command: "echo '0' > '{{ steps.check_remaining.output.feature_dir }}/.drift_revisions'"

          # ── Test trend analysis ──
          - id: run_test_trend
            type: shell
            command: >
              bash scripts/test-trend-analyzer.sh
              "{{ steps.check_remaining.output.feature_dir }}"

          # ── Retrospective ──
          - id: run_retrospect
            type: prompt
            command: speckit.retrospect
            integration: claude
            input:
              args: >
                Read .artifacts/test-trend-report.md if available.
                Use the trend report to assess test suite health.
                If TREND_HEALTHY=false: flag degradation areas for attention.
                If no trend report available: proceed with standard retrospective.

          - id: review_retrospect
            type: gate
            message: |
              Review the retrospect report.
              Approve when all blocking issues are resolved.
              Revise to send back for more iteration (within implement_loop).
              Select abort if further iteration is not warranted
              (will trigger again next implement_loop iteration).
            options: [approve, revise, abort]
            on_revise:
              - id: record-and-trim-implement
                type: shell
                command: >
                  bash scripts/record-and-trim.sh implement_loop
                  "{{ steps.implement_loop_iteration.output.count || 1 }}"
              - goto: run_retrospect

          # ── Drift check ──
          - id: execute_drift_check
            type: prompt
            command: speckit.check
            integration: claude
            input:
              args: >
                Run only check [Z] — Constraint Drift Detection.
                Compare the implementation just completed against plan.md §16
                (Architectural constraints). plan.md §16 is the source of truth.
                CLAUDE.md is advisory and may paraphrase constraints — DO NOT
                rely on CLAUDE.md for constraint checking. Read plan.md directly.
                Report PASS/FAIL/N/A for each constraint.
                For any FAIL: fix the violation immediately.
                Write a detailed report to .artifacts/drift_check_report.md
                with each constraint, its result, and file:line references for FAILs.

          - id: drift_check_result
            type: shell
            command: >
              bash scripts/check-drift.sh
              "{{ steps.check_remaining.output.feature_dir }}"

          - id: check_drift_revision
            type: shell
            command: >
              bash scripts/check-drift-revisions.sh
              "{{ steps.check_remaining.output.feature_dir }}"

          - id: drift_check_gate
            type: gate
            message: |
              Drift check: {{ steps.drift_check_result.output || "skipped (no retro trigger)" }}
              {% if steps.drift_check_result.output.DRIFT_DETECTED == 'true' %}
              **DRIFT DETECTED** ({{ steps.drift_check_result.output.DRIFT_FAIL_COUNT || 0 }} violation(s)):
              {{ steps.drift_check_result.output.DRIFT_FAIL_LINES || "See stderr above." }}
              Fix the violations above and revise to re-run drift detection.
              {% if steps.check_drift_revision.output.MAX_DRIFT_REVISIONS_EXCEEDED == 'true' %}
              **Drift revision limit reached**. You must abort for manual review.
              {% endif %}
              {% endif %}
            options: [approve, revise, abort]
            on_revise:
              - id: record_drift_violation
                type: shell
                command: >
                  bash scripts/check-stagnation.sh --record-drift
                  "{{ steps.check_remaining.output.feature_dir }}"
              - id: check_drift_revision
                type: shell
                command: >
                  bash scripts/check-drift-revisions.sh
                  "{{ steps.check_remaining.output.feature_dir }}"
              - id: drift_revision_limit_check
                type: if
                condition: "{{ steps.check_drift_revision.output.MAX_DRIFT_REVISIONS_EXCEEDED == 'true' }}"
                then:
                  - id: drift_revision_exhausted
                    type: gate
                    message: |
                      Drift fix exhausted 2 revision attempts.
                      The violations cannot be fixed automatically.
                      Must abort for manual review.
                    options: [abort]
                    on_abort:
                      - goto: abort
                else:
                  - goto: execute_drift_check
            on_abort:
              - id: cleanup-on-abort-drift
                type: shell
                command: >
                  bash scripts/cleanup-abandoned-state.sh
                  "{{ steps.check_remaining.output.feature_dir }}"
                  "drift_check"
              - goto: abort

          # ── Traceability re-check (LAST in if-block) ───────────
          # Moved to the end so that when the user selects "revise",
          # the if-block ends naturally and the while loop restarts.
          # No goto needed — the loop naturally restarts on the next iteration.
          - id: run_traceability_recheck
            type: shell
            command: >
              bash scripts/traceability-check.sh
              "{{ steps.check_remaining.output.feature_dir }}"

          - id: traceability_gate
            type: gate
            message: |
              Periodic traceability re-check (every 5 tasks):
              {% if steps.run_traceability_recheck.output.TRACEABLE == 'false' %}
              **GAPS DETECTED** ({{ steps.run_traceability_recheck.output.TRACE_GAP_COUNT || 0 }} gap(s)):
              {{ steps.run_traceability_recheck.output.TRACE_GAPS || "See stderr above." }}
              Implementation has drifted from spec. Fix tasks.md or spec to close gaps.
              {% else %}
              All tasks still traceable to spec. No drift detected.
              {% endif %}
            options: [approve, revise]
            on_revise:
              - id: add-traceability-fix-tasks
                type: prompt
                integration: claude
                input:
                  args: >
                    Read tasks.md and the traceability check output above.
                    For each gap (missing spec reference, missing plan section
                    coverage), add a specific fix task to tasks.md with clear
                    acceptance criteria. Print the list of added tasks.
            # No goto — if-block ends, while loop naturally restarts
            # The next iteration picks up the new fix tasks

          # ── Post-gate checkpoint (end of retro_drift_check) ──────
          # Records that gates passed. Enables recovery if session
          # crashes during speckit.retrospect or speckit.check above.
          - id: post_gate_checkpoint
            type: shell
            command: >
              bash scripts/post-gate-checkpoint.sh
              "{{ steps.check_remaining.output.feature_dir }}"

      # ── Issue K: Module boundary verify ────────────────────────
      # Run speckit.verify at module boundaries (after all tasks of
      # one type complete), not just at the end. This catches drift
      # early before it accumulates across multiple module types.
      - id: module_boundary_verify
        type: if
        condition: >
          {{ steps.check_remaining.output.retro_trigger == 'true' }}
        then:
          - id: run_module_verify
            type: prompt
            command: speckit.verify
            integration: claude
            input:
              args: >
                Run speckit.verify with scope "module" (not "full").
                Verify only the module type that just completed.
                This is a lightweight check — focus on the recently
                completed task's module, not the entire codebase.
                Write findings to .artifacts/module-verify-report.md.
                If drift detected: fix in code or add fix task.

  # ── PHASE 6: CODE REVIEW CHECKLIST (bounded) ────────────────────
  # Adversarial hardening runs once before the code review loop.
  # Moved from per-task implement_code to avoid over-engineering simple tasks.
  - id: adversarial_hardening
    command: speckit.code-review
    integration: claude
    input:
      args: >
        Run the catastrophic scenario hardening review:
        Read plan.md §15 highest_risk_paths.
        For each path, simulate: database drop mid-transaction, idempotency key
        eviction, client retry storm (5x in 100ms), downstream 503 halfway through.
        Verify or fix: ACID compliance, idempotency, exponential backoff with jitter,
        graceful degradation.
        Write findings to .artifacts/hardening-report.md.

  - id: backup-before-code-review
    type: shell
    command: >
      bash scripts/backup-tasks.sh
      "{{ steps.check_remaining.output.feature_dir }}" "pre-code-review"

  - id: code_review_round
    type: while
    condition: "true"
    max_iterations: 3
    steps:
      - id: code_review
        command: speckit.code-review
        integration: claude
        input:
          args: >
            REVISION CONTEXT: If .specify/specs/[feature]/revision_history.md exists,
            read it. Do not repeat fixes that were already tried and rejected.

            Run the full code review checklist.
            Every item must be PASS, FAIL, or N/A.
            For every FAIL: apply the fix immediately.
            Produce REVIEW_REPORT.md documenting the outcome.

      - id: check_code_review_threshold
        type: shell
        command: "bash scripts/gate-threshold.sh code-review {{ steps.code_review_round_iteration.output.count || 1 }}"

      - id: review-code-review
        type: gate
        message: |
          ━━ CODE REVIEW ROUND {{ steps.code_review_round_iteration.output.count || 1 }}/3 ━━

          Review the code review checklist results.

          [ ] All security items: PASS or N/A
          [ ] All correctness items: PASS
          [ ] All performance items: PASS or N/A
          [ ] All maintainability items: PASS
          [ ] All accessibility items: PASS, N/A
          [ ] REVIEW_REPORT.md produced
          {% if steps.check_code_review_threshold.output.AUTO_APPROVE == 'true' %}
          **Revision threshold exceeded**. You MUST revise.
          {% endif %}

          Approve to continue to final verify.
          Revise to send the checklist back for fixes.
        options: [approve, revise, abort]
        on_revise:
          - id: record-and-trim-code-review
            type: shell
            command: >
              bash scripts/record-and-trim.sh code_review_round
              "{{ steps.code_review_round_iteration.output.count || 1 }}"
          - id: validate-code-review-fixes
            type: shell
            command: >
              bash scripts/validate-fix-tasks.sh
              "{{ steps.check_remaining.output.feature_dir }}"
          - id: backup-code-review-fixes
            type: shell
            command: >
              bash scripts/backup-tasks.sh
              "{{ steps.check_remaining.output.feature_dir }}" "code-review"
          - id: plan-code-review-fixes
            type: prompt
            integration: claude
            input:
              args: >
                Read REVIEW_REPORT.md and tasks.md. For every FAIL item, add a
                specific fix task to tasks.md with clear acceptance criteria.

                DEDUPLICATION: Before adding each fix task, check if a task with
                the same acceptance criterion already exists in tasks.md (any status).
                If the same FAIL item was already addressed in a previous revision round:
                - Skip it — it was already added.
                - Do NOT create a duplicate task.
                Print: "Added [N] new fix tasks, skipped [M] duplicates from previous rounds."
          - goto: code_review
        on_abort:
          - id: cleanup-abort-code-review
            type: shell
            command: >
              bash scripts/cleanup-abandoned-state.sh
              "$(bash scripts/find-first-feature.sh)"
              "code_review"
          - goto: abort

  # ── POST-LOOP COMPLETENESS CHECK ────────────────────────────
  # Verifies that implement_loop completed all tasks before proceeding.
  # If max_iterations was reached with TODO tasks remaining, fail loudly.
  # ── POST-LOOP INTEGRATION & BASELINE ──────────────────────────
  # C1 + C2: After all tasks complete, run full regression baseline
  # and integration smoke test before code review.
  - id: post_loop_final_check
    type: shell
    command: "bash scripts/check-tasks-safe.sh"

  - id: full_regression_baseline
    type: if
    condition: >
      {{ steps.post_loop_final_check.output.has_todo == 'false' }}
    then:
      - id: run_regression_baseline
        type: shell
        command: >
          bash scripts/regression-baseline.sh
          "{{ steps.check_remaining.output.feature_dir }}"

      - id: integration_smoke_test
        type: shell
        command: >
          bash scripts/integration-smoke.sh
          "{{ steps.check_remaining.output.feature_dir }}"

  - id: verify_all_tasks_done
    type: if
    condition: >
      {{ steps.post_loop_final_check.output.has_todo == 'true' }} or
      {{ steps.post_loop_final_check.output.abandoned_count | int }} > 0
    then:
      - id: incomplete_tasks_warning
        type: shell
        command: >
          bash scripts/log-incomplete-implementation.sh
          "{{ steps.post_loop_final_check.output.todo_count }}"
          "{{ steps.post_loop_final_check.output.abandoned_count }}"
          "{{ steps.post_loop_final_check.output.in_progress }}"

  - id: abandoned_task_summary
    type: if
    condition: >
      {{ steps.post_loop_final_check.output.abandoned_count | int }} > 0
    then:
      - id: run_abandoned_summary
        command: speckit.abandoned-summary
        integration: claude
        input:
          args: >
            List all ABANDONED tasks from tasks.md.
            For each, summarize: task title, reason for abandonment (from tasks.md notes),
            and what functionality is missing as a result.
            Write the summary to .artifacts/abandoned-tasks-summary.md.
            Print: "ABANDONED TASKS SUMMARY: [N] tasks abandoned"

  # ── PHASE 7: FINAL VERIFY ───────────────────────────────────────
  - id: final_verify
    command: speckit.verify
    integration: claude
    input:
      args: "full"

  - id: review-final-verify
    type: gate
    message: |
      Review the final verify report.

      CLEAN → spec and code are fully aligned. Ready to merge.
      DRIFT DETECTED → fix issues before merging.
        For each issue, decide: fix in code (align to spec) or fix in spec
        (intentional deviation). Add fix tasks to tasks.md if needed,
        then select "fix-needed" to resume the implement loop.
    options: [approved-clean, fix-needed, abort]
    on_abort:
      - id: cleanup-abort-final-verify
        type: shell
        command: >
          bash scripts/cleanup-abandoned-state.sh
          "$(bash scripts/find-first-feature.sh)"
          "final_verify"
      - goto: abort
    on_fix-needed:
      # Transition to bounded fix_needed_round loop
      - id: record-fix-needed-start
        type: shell
        command: >
          bash scripts/record-phase-revision.sh fix_needed_round 1
      - goto: fix_needed_round

  - id: backup-before-fix-needed
    type: shell
    command: >
      bash scripts/backup-tasks.sh
      "{{ steps.check_remaining.output.feature_dir }}" "pre-fix-needed"

  - id: fix_needed_round
    type: while
    condition: "true"
    max_iterations: 2
    steps:
      - id: fix_needed
        type: gate
        message: |
          Review the final verify report for remaining drift issues.
          CLEAN → spec and code are fully aligned. Ready to merge.
          DRIFT DETECTED → fix issues before merging.
            For each issue, decide: fix in code (align to spec) or fix in spec
            (intentional deviation). Add fix tasks to tasks.md if needed.
          Round {{ steps.fix_needed_round_iteration.output.count || 1 }}/2.
        options: [approved-clean, fix-needed, abort]
        on_fix-needed:
          - id: add-fix-tasks
            type: prompt
            integration: claude
            input:
              args: >
                Read tasks.md and the final verify report.
                Use ddd-clean-arch/templates/fix-task-template.md to format each fix task.
                For each drift issue, add a fix task to tasks.md with clear
                acceptance criteria. Print the list of added tasks.
          - id: validate-fix-tasks
            type: shell
            command: >
              bash scripts/validate-fix-tasks.sh
              "{{ steps.check_remaining.output.feature_dir }}"
          - id: backup-fix-tasks
            type: shell
            command: >
              bash scripts/backup-tasks.sh
              "{{ steps.check_remaining.output.feature_dir }}" "fix-needed"
          - id: record-fix-needed-revision
            type: shell
            command: >
              bash scripts/record-and-trim.sh fix_needed_round
              "{{ steps.fix_needed_round_iteration.output.count || 1 }}"
          - goto: implement_loop
        on_abort: abort

  # ── PHASE 8: POST-DEPLOYMENT VERIFICATION (N5) ────────────────
  # Optional phase that deploys to staging and validates the system
  # works in a production-like environment. Closes the loop between
  # "code is correct" and "system works in production."
  - id: post_deploy_verify
    type: gate
    message: |
      All implementation and verification complete.

      Proceed to post-deployment verification?
      This phase deploys to a staging environment and runs
      E2E tests, health checks, and migration verification.

      Select "skip" to bypass (useful for local development).
      Select "deploy" to proceed with staging verification.
    options: [deploy, skip]
    on_deploy:
      - id: deploy_to_staging
        type: prompt
        integration: claude
        input:
          args: >
            Deploy the application to a staging environment.
            1. Run database migrations against the staging database
            2. Build and deploy all services
            3. Wait for all health checks to pass
            4. Verify: deployment successful, all services healthy

      - id: e2e_verification
        type: shell
        command: >
          # Run E2E tests against staging
          E2E_BASE_URL=${DEPLOY_STAGING_URL:-http://staging.example.com} \
          npm run test:e2e 2>&1 || echo "E2E tests completed with some failures"

      - id: health_check
        type: shell
        command: >
          # Verify health endpoints
          HEALTH=$(curl -sf --max-time 10 ${DEPLOY_STAGING_URL:-http://staging.example.com}/health 2>&1 || echo "UNHEALTHY")
          echo "HEALTH_CHECK: $HEALTH"

      - id: migration_verify
        type: shell
        command: >
          # Verify migration state matches plan.md §12
          echo "MIGRATION_VERIFY: Check that migration state in staging matches plan.md §12"

      - id: post_deploy_summary
        type: gate
        message: |
          ━━ POST-DEPLOYMENT VERIFICATION ━━

          Deployment: [check deploy output above]
          E2E Tests: [check e2e output above]
          Health Check: [check health output above]
          Migration State: [check migration output above]

          Approve to mark the workflow as fully complete.
          Revise to investigate failures.
        options: [approve, revise]
    on_skip:
      - id: skip_post_deploy
        type: shell
        command: "echo 'Post-deployment verification skipped.'"
