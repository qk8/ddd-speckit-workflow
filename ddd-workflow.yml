# ── DDD + Clean Architecture Workflow Orchestrator ────────────────
#
# This file declares the workflow structure: phase imports and
# transitions between phases. Use `scripts/build-workflow.sh` to
# merge phases into a single runtime YAML.
#
# Phase order:
#   00-validate  →  01-clarify  →  02-spec  →  03-plan
#   04-tasks     →  05-implement →  06-code-review → 07-verify
#   08-post-deploy
#
# Transitions:
#   validate.approve    → clarify
#   clarify.approve     → spec
#   spec.approve        → plan
#   plan.approve        → tasks
#   tasks.approve       → implement
#   implement.complete  → code-review
#   code-review.approve → verify
#   verify.approved-clean → post-deploy
#   verify.fix-needed   → fix_needed_round (in verify, jumps to impl_loop)
#   abort               → cleanup + exit (from any phase)
#
# Schema:
schema_version: "1.0"
workflow:
  id: "ddd-full-cycle"
  name: "DDD + Clean Architecture Full Cycle"
  version: "2.0.0"
  author: "your-org"
  description: >
    Full spec-driven development cycle with DDD and Clean Architecture.
    Modular phase architecture — merge with scripts/build-workflow.sh.

requires:
  speckit_version: "0.7.2"
  integrations:
    any: ["claude"]

inputs: {}

# Phase imports — each file is a self-contained phase.
# The build script merges these into a flat steps list.
imports:
  - workflows/phases/00-validate.yml
  - workflows/phases/01-clarify.yml
  - workflows/phases/02-spec.yml
  - workflows/phases/03-plan.yml
  - workflows/phases/04-tasks.yml
  - workflows/phases/05-implement.yml
  - workflows/phases/06-code-review.yml
  - workflows/phases/07-verify.yml
  - workflows/phases/08-post-deploy.yml
