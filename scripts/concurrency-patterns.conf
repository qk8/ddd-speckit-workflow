# concurrency-patterns.conf — Patterns for deterministic concurrency safety check [W]
#
# Each section defines a pattern to search for in source files.
# Format:
#   [CHECK_ID.DESCRIPTION]
#   language=...           # comma-separated langs (java,ts,js,python,go,ruby,all)
#   file_pattern=...       # glob pattern for files to scan
#   must_contain=...       # regex pattern that MUST be present
#   must_not_contain=...   # regex pattern that MUST NOT be present (optional)
#   severity=critical|warning
#
# If must_contain is not found in the relevant file → FAIL
# If must_not_contain is found → FAIL

# ── Idempotency Keys ────────────────────────────────────────────
# Handlers marked idempotent in plan.md §8 must use idempotency keys
[W.IDEMPOTENCY_KEY]
language=java,ts,js,python,go
file_pattern=**/handler*.*,**/controller*.*,**/endpoint*.*,**/route*.,**/action*.,**/command*
must_contain=idempoten|request_id|correlation_id|X-Request-Id|X-Idempotency-Key
severity=critical

# ── Optimistic Locking ──────────────────────────────────────────
# Aggregates with optimistic_version strategy must check version fields
[W.OPTIMISTIC_LOCK]
language=java,ts,js,python,go
file_pattern=**/aggregate*.*,**/entity*.*,**/model*.,**/domain*
must_contain=version|Version|@Version|version_check|optimistic|lock
severity=critical

# ── Transaction Boundaries ──────────────────────────────────────
# Transactions must be in application layer, NOT in domain/delivery
[W.TRANSACTION_BOUNDARY]
language=java,ts,js,python,go
file_pattern=**/domain/**/*.*,**/models/**/*.,**/entities/**/*
must_not_contain=EntityManager|Repository\.|db\.|session\.|\.commit\(|\.rollback\(|MongoRepository|SqlAlchemy
severity=critical

# ── Domain Event Dispatch ───────────────────────────────────────
# After commit, domain events must be dispatched
[W.DOMAIN_EVENT_DISPATCH]
language=java,ts,js,python,go
file_pattern=**/handler*.*,**/service*.*,**/usecase*
must_contain=event|Event|publish|dispatch|notify|emit
severity=warning

# ── Race Condition: Read-Modify-Write ───────────────────────────
# Patterns that read, modify, and write without locking are risky
[RACE.READ_MODIFY_WRITE]
language=java,ts,js,python,go
file_pattern=**/*
must_not_contain=^\s*(let|var|const|int|Integer|var)\s+\w+\s*=\s*\w+\.get|^\s*(let|var|const|int)\s+\w+\s*=.*\.find|^\s*(val|def)\s+\w+\s*=\s*\w+\.find
severity=warning

# ── Shared Mutable State ────────────────────────────────────────
# Static mutable fields in request-scoped handlers are dangerous
[SHARED.MUTABLE_STATE]
language=java,ts,js,python,go
file_pattern=**/handler*.*,**/controller*.*,**/endpoint*.,**/route*.
must_not_contain=static\s+(List|Map|Set|Dict|ArrayList|HashMap|HashSet|var\s+\w+\s*=.*\[|let\s+\w+\s*=\s*\[|def\s+\w+\s*=\s*\{)
severity=critical

# ── Connection/Resource Leak ────────────────────────────────────
# Open resources without close/finally/defer
[RESOURCE.LEAK]
language=java,ts,js,python,go
file_pattern=**/*
must_not_contain=^\s*(new\s+Connection|open\(|\.connect\(|f\s*=\s*open\(|File\.open|db\.connect)
must_contain=finally|defer|\.close\(|using\s*\(|try\s*with|using\s*\(|scope
severity=warning
