# ── PHASE 7: FINAL VERIFY + FIX NEEDED ──────────────────────────
# Post-loop checks, full verify, spec-code delta, fix_needed loop.

steps:

  - id: vf_post_loop_check
    type: shell
    command: "bash scripts/check-tasks-safe.sh"

  - id: vf_regression_baseline
    type: shell
    command: >
      bash scripts/regression-baseline.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}"

  - id: vf_integration_smoke
    type: shell
    command: >
      bash scripts/integration-smoke.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}"

  - id: vf_perf_regression
    type: shell
    command: >
      bash scripts/perf-regression.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}" || true

  - id: vf_dep_scan
    type: shell
    command: >
      bash scripts/run-dep-scan.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}" || true

  - id: vf_verify_all
    type: if
    condition: >
      {{ steps.vf_post_loop_check.output.has_todo == 'true' }} or
      {{ steps.vf_post_loop_check.output.abandoned_count | int }} > 0
    then:
      - id: vf_incomplete_warning
        type: shell
        command: >
          bash scripts/log-incomplete-implementation.sh
          "{{ steps.vf_post_loop_check.output.todo_count }}"
          "{{ steps.vf_post_loop_check.output.abandoned_count }}"
          "{{ steps.vf_post_loop_check.output.in_progress }}"

  - id: vf_abandoned_summary
    type: if
    condition: >
      {{ steps.vf_post_loop_check.output.abandoned_count | int }} > 0
    then:
      - id: vf_run_abandoned
        command: speckit.abandoned-summary
        integration: claude
        input:
          args: >
            List all ABANDONED tasks from tasks.md.
            For each, summarize: task title, reason for abandonment (from tasks.md notes),
            and what functionality is missing as a result.
            Write the summary to .artifacts/abandoned-tasks-summary.md.
            Print: "ABANDONED TASKS SUMMARY: [N] tasks abandoned"

  - id: vf_final_verify
    command: speckit.verify
    integration: claude
    input:
      args: "full"

  - id: vf_requirement_validation
    type: shell
    command: >
      bash scripts/requirement-validate.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}" || true

  - id: vf_spec_code_delta
    type: prompt
    command: speckit.verify
    integration: claude
    input:
      args: >
        Produce a spec-code delta report.
        Compare plan.md and tasks.md against the actual codebase.
        List any remaining discrepancies not caught by the full verify.
        Write summary to .artifacts/spec-code-delta.md.
        Print: "SPEC-CODE DELTA: CLEAN (no remaining discrepancies)"
        or "SPEC-CODE DELTA: [N] remaining issues found"

  - id: vf_review_final
    type: gate
    message: |
      Review the final verify report, requirement validation, and spec-code delta.

      **Requirement Validation:** Check .artifacts/requirement-validation.md
      for any requirements with no corresponding implementation evidence.

      **Spec-Code Delta:** Check .artifacts/spec-code-delta.md for remaining
      discrepancies between plan.md/tasks.md and the actual codebase.

      CLEAN → spec and code are fully aligned. All requirements have evidence.
      Ready to merge.
      DRIFT DETECTED → fix issues before merging.
        For each issue, decide: fix in code (align to spec) or fix in spec
        (intentional deviation). Add fix tasks to tasks.md if needed,
        then select "fix-needed" to resume the implement loop.
    options: [approved-clean, fix-needed, abort]
    on_abort:
      - id: vf_cleanup_abort
        type: shell
        command: >
          bash scripts/recovery-engine.sh abort
          "$(bash scripts/find-first-feature.sh)"
          "final_verify"
      - goto: abort
    on_fix-needed:
      - id: vf_record_fix_needed
        type: shell
        command: >
          bash scripts/record-phase-revision.sh fix_needed_round 1
      - goto: fix_needed_round

  - id: vf_backup_fix_needed
    type: shell
    command: >
      bash scripts/backup-tasks.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}" "pre-fix-needed"

  - id: vf_track_fix_cycle
    type: shell
    command: >
      bash scripts/state-engine.sh fix-cycles-increment
      "{{ steps.impl_check_remaining.output.feature_dir }}"

  - id: vf_fix_cycle_limit
    type: if
    condition: >
      {{ steps.vf_track_fix_cycle.output | default '' }} != '' or true
    then:
      - id: vf_check_fix_cycle_count
        type: shell
        command: >
          bash scripts/state-engine.sh read
          "{{ steps.impl_check_remaining.output.feature_dir }}" fix_cycles
      - id: vf_fix_cycle_gate
        type: if
        condition: >
          {{ steps.vf_check_fix_cycle_count.output | int }} >= 3
        then:
          - id: vf_fix_cycle_human_gate
            type: gate
            message: |
              ⚠ FIX-NEEDED CYCLE LIMIT REACHED

              This is cycle #{{ steps.vf_check_fix_cycle_count.output }} of the fix-needed loop.
              The maximum of 3 fix-needed cycles has been reached.

              Repeated fix-needed cycles indicate a deeper spec/plan problem
              that iterative fixing won't resolve. You must:

              1. Review the spec-code delta report (.artifacts/spec-code-delta.md)
              2. Determine if the spec needs revision (speckit.spec-revise)
              3. Or determine if the implementation approach is fundamentally flawed

              Options:
                revise-spec — Run speckit.spec-revise, then reset fix cycles and retry.
                abort — Cancel the workflow for manual review of spec vs implementation mismatch.

            options: [revise-spec, abort]
            on_revise-spec:
              - id: vf_reset_fix_cycles
                type: shell
                command: >
                  bash scripts/state-engine.sh fix-cycles-reset
                  "{{ steps.impl_check_remaining.output.feature_dir }}"
              - id: vf_run_spec_revise
                command: speckit.spec-revise
                integration: claude
                input:
                  args: >
                    The fix-needed loop has been exceeded 3 times.
                    This indicates the spec is fundamentally misaligned with
                    what the implementation produces.

                    Read the spec-code delta report, identify root causes,
                    and revise spec.md and plan.md accordingly.
                    After revision, add new tasks to tasks.md if needed.
            on_abort:
              - goto: abort

  - id: fix_needed_round
    type: while
    condition: "true"
    max_iterations: 5
    steps:
      - id: fix_needed_gate
        type: gate
        message: |
          Review the final verify report for remaining drift issues.
          CLEAN → spec and code are fully aligned. Ready to merge.
          DRIFT DETECTED → fix issues before merging.
            For each issue, decide: fix in code (align to spec) or fix in spec
            (intentional deviation). Add fix tasks to tasks.md if needed.
          Round {{ steps.fix_needed_round_iteration.output.count || 1 }}/5.
        options: [approved-clean, fix-needed, abort]
        on_approved-clean:
          - id: fix_reset_cycles
            type: shell
            command: >
              bash scripts/state-engine.sh fix-cycles-reset
              "{{ steps.impl_check_remaining.output.feature_dir }}"
        on_fix-needed:
          - id: fix_add_tasks
            type: prompt
            integration: claude
            input:
              args: >
                Read tasks.md and the final verify report.
                Use ddd-clean-arch/templates/fix-task-template.md to format each fix task.
                For each drift issue, add a fix task to tasks.md with clear
                acceptance criteria. Print the list of added tasks.
          - id: fix_validate
            type: shell
            command: >
              bash scripts/validate-fix-tasks.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}"
          - id: fix_backup
            type: shell
            command: >
              bash scripts/backup-tasks.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}" "fix-needed"
          - id: fix_record
            type: shell
            command: >
              bash scripts/record-and-trim.sh fix_needed_round
              "{{ steps.fix_needed_round_iteration.output.count || 1 }}"
          - id: fix_rollback
            type: shell
            command: >
              bash scripts/recovery-engine.sh restore
              "{{ steps.impl_check_remaining.output.feature_dir }}" "" || true
            continue_on_error: true
          - goto: impl_loop
        on_abort: abort

  # ── Post-loop gate: ensures exhausted iterations don't silently proceed ──
  - id: vf_fix_needed_post_loop
    type: gate
    message: |
      ━━ FIX-NEEDED LOOP COMPLETE ━━

      {%- if steps.fix_needed_round_iteration.output.count | int >= 5 %}
      **Note**: Max iterations (5) reached. Remaining drift issues were not resolved.
      {%- endif %}

      Review the final state:

      [ ] .artifacts/spec-code-delta.md reviewed
      [ ] .artifacts/requirement-validation.md reviewed
      [ ] No unresolved drift items remain

      [approved-clean] — All issues resolved. Ready to merge.
      [fix-needed] — Add more fix tasks and retry (reset cycle count).
      [abort] — Cancel for manual review of spec vs implementation mismatch.
    options: [approved-clean, fix-needed, abort]
    on_approved-clean:
      - id: vf_fix_reset_final
        type: shell
        command: >
          bash scripts/state-engine.sh fix-cycles-reset
          "{{ steps.impl_check_remaining.output.feature_dir }}"
    on_fix-needed:
      - id: vf_fix_retry_reset
        type: shell
        command: >
          bash scripts/state-engine.sh fix-cycles-reset
          "{{ steps.impl_check_remaining.output.feature_dir }}"
      - goto: fix_needed_round
    on_abort:
      - id: vf_fix_abort_cleanup
        type: shell
        command: >
          bash scripts/recovery-engine.sh abort
          "$(bash scripts/find-first-feature.sh)"
          "fix_needed_post_loop"
      - goto: abort
