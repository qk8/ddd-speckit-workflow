# ── PHASE 5: IMPLEMENT LOOP ─────────────────────────────────────
# DAG-structured task execution with checks, gates, stagnation detection.
# Decomposed into sub-phases (auto-discovered by build-workflow.sh):
#   .05-implement-01-stagnation.yml — DEPRECATED (stagnation gate moved inline)
#   05-implement-02-core.yml       — Core task execution (write-test → implement → verify)
#   05-implement-03-gates.yml      — Acceptance, quality, TDD gates
#   05-implement-04-retro.yml      — Retrospective + drift detection
#   05-implement-05-traceability.yml — Periodic traceability re-check
# Condition: has_todo == true.
# max_iterations: hard cap of 100.
# Derivation: ~10 tasks per batch * ~8 iterations for checks/gates per batch + 20 safety margin.
# Adjust if total_tasks * (avg_checks_per_batch + 1) approaches this cap.
# The stagnation gate (line 208) catches real problems after ~5-15 no-progress iterations.
# Revision exhaustion is handled by check-task-revisions.sh in the core sub-phase.

steps:

  - id: impl_loop
    type: while
    condition: >
      {{ steps.impl_check_remaining.output.has_todo == 'true' }}
    max_iterations: 100
    steps:

      - id: impl_check_pause_resume
        type: shell
        command: >
          bash scripts/workflow-resume.sh
          "$(bash scripts/find-first-feature.sh)"
        continue_on_error: true

      - id: impl_check_mcp_health
        type: shell
        command: >
          bash scripts/mcp-health-check.sh all || true
        continue_on_error: true

      - id: impl_check_token_budget
        type: shell
        command: >
          bash scripts/token-budget-check.sh
          "$(bash scripts/find-first-feature.sh)" || true
        continue_on_error: true

      - id: impl_check_remaining
        type: shell
        command: "bash scripts/check-tasks-safe.sh"

      - id: impl_loop_iteration
        type: shell
        command: >
          bash scripts/increment-iteration.sh
          "{{ steps.impl_check_remaining.output.feature_dir }}"
        continue_on_error: true

      - id: impl_snapshot
        type: shell
        command: >
          bash scripts/check-point.sh snapshot
          "{{ steps.impl_check_remaining.output.feature_dir }}"
          "{{ steps.impl_check_remaining.output.todo_task_id || 'unknown' }}"
          "{{ steps.impl_check_remaining.output.feature_dir }}/../.."
        continue_on_error: true

      - id: impl_check_spec_revision_limit
        type: shell
        command: >
          bash scripts/check-spec-revisions.sh --dry-run
          "{{ steps.impl_check_remaining.output.feature_dir }}"

      - id: impl_check_spec_revision
        type: if
        condition: >
          {{ steps.impl_check_remaining.output.todo_task_type == 'spec_revision' }} and
          {{ steps.impl_check_spec_revision_limit.output.SPEC_REVISION_EXHAUSTED != 'true' }}
        then:
          - id: impl_run_spec_revise
            type: prompt
            command: speckit.spec-revise
            integration: claude
            input:
              args: >
                This is a spec_revision task — the spec was discovered to be
                wrong during implementation.
                Read pending-learnings.md, identify spec corrections needed,
                create/update plan.md and spec.md, and add fix tasks if needed.
                After revision, the implement loop will re-process affected tasks.
          - id: impl_record_spec_revision
            type: shell
            command: >
              bash scripts/check-spec-revisions.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}"
          - id: impl_validate_spec_revision_fixes
            type: shell
            command: >
              bash scripts/validate-fix-tasks.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}"
          - id: impl_spec_version_increment
            type: shell
            command: >
              bash scripts/state-engine.sh spec-increment
              "{{ steps.impl_check_remaining.output.feature_dir }}"

      - id: impl_check_cleanup
        type: if
        condition: "{{ steps.impl_loop_iteration.output.count || 1 }} % 25 == 0"
        then:
          - id: impl_cleanup
            type: shell
            command: >
              bash scripts/cleanup-artifacts.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}"
              "{{ steps.impl_loop_iteration.output.count || 1 }}"

      - id: impl_check_llm_quality
        type: if
        condition: "{{ steps.impl_loop_iteration.output.count || 1 }} % 10 == 0"
        then:
          - id: impl_run_llm_quality
            type: shell
            command: >
              bash scripts/measure-llm-quality.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}" || true

      - id: impl_check_periodic
        type: if
        condition: "{{ steps.impl_loop_iteration.output.count || 1 }} % 20 == 0"
        then:
          - id: impl_session_health
            type: shell
            command: >
              bash scripts/session-health.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}" || true
          - id: impl_scope_audit
            type: shell
            command: >
              bash scripts/scope-audit.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}" || true
          - id: impl_velocity_status
            type: shell
            command: >
              bash scripts/velocity-tracker.sh status
              "{{ steps.impl_check_remaining.output.feature_dir }}" || true

      - id: impl_check_context_health
        type: if
        condition: "{{ steps.impl_loop_iteration.output.count || 1 }} % 10 == 0"
        then:
          - id: impl_context_health
            type: shell
            command: >
              bash scripts/context-health.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}" || true

      - id: impl_check_coverage
        type: if
        condition: "{{ steps.impl_loop_iteration.output.count || 1 }} % 5 == 0"
        then:
          - id: impl_run_quantitative
            type: shell
            command: >
              bash scripts/run-quantitative.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}" || true

      - id: impl_check_parse_error
        type: if
        condition: "{{ steps.impl_check_remaining.output.TASKS_PARSE_ERROR == '1' }}"
        then:
          - id: impl_parse_error_gate
            type: gate
            message: |
              ⚠ Task tracking is BROKEN — check-tasks.sh failed to parse tasks.md.

              The workflow cannot safely determine task state.
              Manual inspection of tasks.md is required before continuing.

              Options:
                fix — Edit tasks.md to fix formatting, then restart the workflow.
                abort — Cancel the workflow.
            options: [fix, abort]
            on_abort:
              - id: impl_cleanup_parse
                type: shell
                command: >
                  bash scripts/cleanup-abandoned-state.sh
                  "{{ steps.impl_check_remaining.output.feature_dir }}"
                  "parse_error"
              - goto: abort

      - id: impl_check_all_done
        type: if
        condition: "{{ steps.impl_check_remaining.output.has_todo == 'false' }}"
        then:
          - id: impl_done_summary
            type: shell
            command: >
              bash scripts/log-impl-complete.sh
              "{{ steps.impl_check_remaining.output.done_count }}"
              "{{ steps.impl_check_remaining.output.total_tasks }}"
              "{{ steps.impl_check_remaining.output.abandoned_count | int }}"
          - id: impl_post_drift
            command: speckit.check
            integration: claude
            input:
              args: >
                Run a lightweight constraint drift check.
                Check only constraint drift for the 3 most common violation
                patterns from quick-drift-check.sh:
                  1. Layer rule violations
                  2. Missing correlation ID
                  3. Test data isolation violations
                Report PASS/FAIL for each. If any FAIL: note it but do not block.
                Write findings to .artifacts/post-implementation-drift.md.
                This is advisory — the full speckit.verify will run in Phase 7.

      - id: impl_stagnation_check
        type: shell
        command: >
          bash scripts/check-stagnation.sh
          "{{ steps.impl_check_remaining.output.feature_dir }}"
          "{{ steps.impl_check_remaining.output.done_count }}"
          "{{ steps.impl_check_remaining.output.total_tasks }}"
          "{{ steps.impl_check_remaining.output.todo_task_type }}"

      # ── Stagnation gate (Fix 6: human gate, not just a shell step) ──
      # Only appears when STAGNANT=true. When STAGNANT=false, skipped entirely.
      - id: impl_stagnation_gate
        type: if
        condition: >
          {{ steps.impl_stagnation_check.output.STAGNANT == 'true' }} and
          {{ steps.impl_check_remaining.output.has_todo == 'true' }}
        then:
          - id: impl_stagnation_review
            type: gate
            message: |
              ⚠ IMPLEMENTATION STAGNATION DETECTED

              No new tasks completed for {{ steps.impl_stagnation_check.output.CONSECUTIVE_NO_PROGRESS }} consecutive iterations.
              Tasks may be blocked, flaky, or the spec may be unrealistic.
              {% if steps.impl_stagnation_check.output.CONSECUTIVE_CONTINUES | int >= 2 %}
              **Continue option exhausted** ({{ steps.impl_stagnation_check.output.CONSECUTIVE_CONTINUES }} consecutive continues).
              You must troubleshoot or abort.
              {% endif %}

              Options:
                continue — Force-continue (risk wasting iterations).
                troubleshoot — Run /speckit.status to diagnose, then decide.
                abort — Cancel the workflow for manual review.
              {% if steps.impl_stagnation_check.output.REVISION_ONLY == 'true' %}
              **Revision loop detected** — revising without completing tasks.
              **Recommended: Select "troubleshoot" or "abort".**
              Continuing a revision loop wastes iterations.
              {% endif %}
            options: [continue, troubleshoot, abort]
            on_continue:
              - id: impl_stag_reset
                type: shell
                command: >
                  bash scripts/check-stagnation.sh --reset
                  "{{ steps.impl_check_remaining.output.feature_dir }}"
            on_troubleshoot:
              - id: impl_status
                command: speckit.status
                integration: claude
              - id: impl_context
                command: speckit.context
                integration: claude
                input:
                  args: >
                    Load focused context for the stuck task.
                    Read tasks.md, identify the IN_PROGRESS or first TODO task.
                    Read plan.md sections relevant to that task.
                    Produce a targeted context window: task scope, acceptance
                    criteria, relevant plan sections, and any error history.
              - id: impl_resume
                type: shell
                command: >
                  bash scripts/reset-stagnation.sh
                  "{{ steps.impl_check_remaining.output.feature_dir }}"
            on_abort:
              - id: impl_cleanup_stag
                type: shell
                command: >
                  bash scripts/cleanup-abandoned-state.sh
                  "{{ steps.impl_check_remaining.output.feature_dir }}"
                  "stagnation"
              - goto: abort

      - id: impl_check_in_progress
        type: if
        condition: "{{ steps.impl_check_remaining.output.in_progress != '' }}"
        then:
          - id: impl_resolve_in_progress
            type: gate
            message: |
              ⚠ IN_PROGRESS task(s) detected from a previous interrupted session:
                {{ steps.impl_check_remaining.output.in_progress }}
              {% if steps.impl_check_remaining.output.in_progress_all != '' and steps.impl_check_remaining.output.in_progress_all != steps.impl_check_remaining.output.in_progress %}
              Additional IN_PROGRESS tasks: {{ steps.impl_check_remaining.output.in_progress_all }}
              {% endif %}

              A previous session was interrupted before this task completed.
              The task may have partial files on disk.

              Choose how to proceed:
                restart  — Mark the task TODO and restart it cleanly.
                continue — Leave it IN_PROGRESS and attempt to resume.
                abandon  — Mark it ABANDONED and skip to the next TODO task.
            options: [restart, continue, abandon]
            on_restart:
              - id: impl_validate_deps
                type: shell
                command: >
                  bash scripts/validate-task-deps.sh
                  "{{ steps.impl_check_remaining.output.feature_dir }}/tasks.md"
                  "{{ steps.impl_check_remaining.output.in_progress }}"
              - id: impl_restart_all
                type: shell
                command: >
                  bash scripts/resolve-all-in-progress.sh
                  "{{ steps.impl_check_remaining.output.feature_dir }}/tasks.md"
                  TODO "Crash recovery — restarted all IN_PROGRESS tasks"
            on_abandon:
              type: shell
              command: >
                bash scripts/resolve-all-in-progress.sh
                "{{ steps.impl_check_remaining.output.feature_dir }}/tasks.md"
                ABANDONED "Crash recovery — abandoning all IN_PROGRESS tasks with cascade"

      - id: impl_check_abandoned
        type: if
        condition: "{{ steps.impl_check_remaining.output.abandoned_count | int > 0 }}"
        then:
          - id: impl_abandon_guard
            type: shell
            command: >
              bash scripts/abandon-guard.sh
              "{{ steps.impl_check_remaining.output.feature_dir }}"
            continue_on_error: true
          - id: impl_warn_abandoned
            type: gate
            message: |
              ⚠ {{ steps.impl_check_remaining.output.abandoned_count }} ABANDONED task(s) found.
              Approve to continue. Revise to clean up abandoned tasks.
              {% if steps.impl_abandon_guard.output.GUARD == 'LOOP_RISK' %}
              **WARNING: This task was previously reset from ABANDONED and failed again.**
              Resetting it again will create an infinite loop. **You must delete this task.**
              {% elif steps.impl_abandon_guard.output.GUARD == 'REQUIRES_DELETION' %}
              **This task has been abandoned multiple times. It must be deleted.**
              {% endif %}
            options: [approve, revise]
            on_revise:
              - id: impl_clean_abandoned
                type: prompt
                integration: claude
                input:
                  args: >
                    Read tasks.md. For each ABANDONED task, either delete the
                    task section or reset its status to TODO. Print a summary.

      - id: impl_module_verify
        type: if
        condition: >
          {{ steps.impl_check_remaining.output.retro_trigger == 'true' }}
        then:
          - id: impl_run_module_verify
            type: prompt
            command: speckit.verify
            integration: claude
            input:
              args: >
                Run speckit.verify with scope "module" (not "full").
                Verify only the module type that just completed.
                This is a lightweight check — focus on the recently
                completed task's module, not the entire codebase.
                Write findings to .artifacts/module-verify-report.md.
                If drift detected: fix in code or add fix task.
