# ── PHASE 6: CODE REVIEW ────────────────────────────────────────
# Adversarial hardening (split into data integrity + resilience)
# + bounded code review loop.
#
# Fix (Issue 8): Split 4 catastrophic scenarios into two focused steps
# to reduce LLM context overload in a single prompt.

steps:

  # ── Data integrity scenarios ────────────────────────────────────
  - id: cr_data_integrity
    command: speckit.code-review
    integration: claude
    input:
      args: >
        Run data integrity catastrophic scenario hardening review:
        Read plan.md §15 highest_risk_paths.
        For each path, simulate:
          1. Database drop mid-transaction — verify ACID compliance,
             transaction rollback behavior, and data consistency.
          2. Idempotency key eviction — verify that retrying a completed
             operation does not cause duplicate side effects.
        Verify or fix: ACID compliance, idempotency guarantees.
        Write findings to .artifacts/hardening-report-data.md.

  # ── Resilience scenarios ────────────────────────────────────────
  - id: cr_resilience
    command: speckit.code-review
    integration: claude
    input:
      args: >
        Run resilience catastrophic scenario hardening review:
        Read plan.md §15 highest_risk_paths.
        For each path, simulate:
          1. Client retry storm (5x in 100ms) — verify exponential
             backoff with jitter, rate limiting, and circuit breaker behavior.
          2. Downstream 503 halfway through a request — verify graceful
             degradation, partial failure handling, and user-facing error messages.
        Verify or fix: exponential backoff with jitter, graceful degradation,
        circuit breaker patterns.
        Write findings to .artifacts/hardening-report-resilience.md.

  - id: cr_backup
    type: shell
    command: >
      bash scripts/backup-tasks.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}" "pre-code-review"

  - id: cr_round
    type: while
    condition: "true"
    max_iterations: 3
    steps:
      - id: cr_review
        command: speckit.code-review
        integration: claude
        input:
          args: >
            REVISION CONTEXT: If .specify/specs/[feature]/revision_history.md exists,
            read it. Do not repeat fixes that were already tried and rejected.

            Run the full code review checklist.
            Every item must be PASS, FAIL, or N/A.
            For every FAIL: apply the fix immediately.
            Produce REVIEW_REPORT.md documenting the outcome.

      - id: cr_threshold
        type: shell
        command: "bash scripts/gate-threshold.sh code-review {{ steps.cr_round_iteration.output.count || 1 }}"

      - id: cr_gate
        type: gate
        message: |
          ━━ CODE REVIEW ROUND {{ steps.cr_round_iteration.output.count || 1 }}/3 ━━

          Review the code review checklist results.

          [ ] All security items: PASS or N/A
          [ ] All correctness items: PASS
          [ ] All performance items: PASS or N/A
          [ ] All maintainability items: PASS
          [ ] All accessibility items: PASS, N/A
          [ ] REVIEW_REPORT.md produced
          {% if steps.cr_threshold.output.AUTO_REVISE == 'true' %}
          **Revision threshold exceeded**. {{ steps.cr_threshold.output.AUTO_REVISE_REASON }}
          **Action**: Select "revise" to run retrospect on remaining tasks.
          {% endif %}

          Approve to continue to final verify.
          Revise to send the checklist back for fixes.
        options: [approve, revise, abort]
        on_revise:
          - id: cr_revise_chain
            type: shell
            command: >
              bash scripts/review-revise-chain.sh
              code_review_round
              "{{ steps.cr_round_iteration.output.count || 1 }}"
              "{{ steps.impl_check_remaining.output.feature_dir }}"
          - id: cr_plan_fixes
            type: prompt
            integration: claude
            input:
              args: >
                Read REVIEW_REPORT.md and tasks.md. For every FAIL item, add a
                specific fix task to tasks.md with clear acceptance criteria.

                DEDUPLICATION: Before adding each fix task, check if a task with
                the same acceptance criterion already exists in tasks.md (any status).
                If the same FAIL item was already addressed in a previous revision round:
                - Skip it — it was already added.
                - Do NOT create a duplicate task.
                Print: "Added [N] new fix tasks, skipped [M] duplicates from previous rounds."
          - goto: cr_review
        on_abort:
          - id: cr_cleanup_abort
            type: shell
            command: >
              bash scripts/cleanup-abandoned-state.sh
              "$(bash scripts/find-first-feature.sh)"
              "code_review"
          - goto: abort
