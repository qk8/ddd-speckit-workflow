# ── PHASE 5 SUB-PHASE: CORE TASK EXECUTION ──────────────────────
# Extracted from 05-implement.yml
# Progress logging, traceability counter, write-test → implement → verify → batch-consistency → checkpoint.
# Note: in-progress/abandoned handling is in the main file (crash recovery).

steps:

  - id: impl_progress
    type: shell
    command: >
      bash scripts/log-iteration-progress.sh
      "{{ steps.impl_loop_iteration.output.count || 1 }}"
      "{{ steps.impl_check_remaining.output.done_count }}"
      "{{ steps.impl_check_remaining.output.total_tasks }}"
      "{{ steps.impl_check_remaining.output.todo_count }}"
      "{{ steps.impl_check_remaining.output.in_progress || 'none' }}"

  - id: impl_increment_traceability_counter
    type: shell
    command: >
      bash scripts/state-engine.sh cadence-increment traceability_counter
      "{{ steps.impl_check_remaining.output.feature_dir }}"

  - id: impl_check_traceability_due
    type: shell
    command: >
      bash scripts/traceability-cadence.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}"

  - id: impl_pre_task_validate
    type: shell
    command: >
      bash scripts/pre-task-validate.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}"

  - id: impl_validate_deps
    type: shell
    command: >
      bash scripts/validate-task-deps.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}/tasks.md"
    continue_on_error: true

  - id: impl_sanitize_prompt
    type: shell
    command: >
      bash scripts/sanitize-prompt.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}" || true

  - id: impl_generate_context
    type: shell
    command: >
      bash scripts/prompt-context.sh "{{ steps.impl_check_remaining.output.feature_dir }}"
      | head -n 500
      || true

  # ── Auto-rollback before implement (Fix 10: mid-task failure recovery) ──
  # Checks for a prior checkpoint and offers rollback if partial files exist.
  - id: impl_pre_rollback_check
    type: shell
    command: >
      bash scripts/recovery-engine.sh restore --dry-run
      "{{ steps.impl_check_remaining.output.feature_dir }}" || echo "ROLLBACK_AVAILABLE=false"
    continue_on_error: true

  - id: impl_rollback_gate
    type: if
    condition: "{{ steps.impl_pre_rollback_check.output.ROLLBACK_AVAILABLE == 'true' }}"
    then:
      - id: impl_rollback_review
        type: gate
        message: |
          ⚠ PRIOR CHECKPOINT DETECTED

          A checkpoint exists with file changes from a previous interrupted session.
          Partial files may exist on disk from the interrupted implementation.

          Options:
            rollback — Restore files to checkpoint state, then restart the task cleanly.
            continue — Keep current files and proceed (risk inconsistent state).
            skip — Mark this checkpoint as handled, do not offer again this session.
        options: [rollback, continue, skip]
        on_rollback:
          - id: impl_do_rollback
            command: speckit.rollback
            integration: claude
            input:
              args: >
                Perform checkpoint restore for the current task.
                Run: bash scripts/recovery-engine.sh restore <feature_dir>
                Verify the diff shows a clean restore.
                Report: "Rollback complete — N files restored to checkpoint state."
        on_skip:
          - id: impl_mark_skip
            type: shell
            command: >
              echo "SKIP_ROLLBACK=true" > "{{ steps.impl_check_remaining.output.feature_dir }}/.artifacts/skip-rollback"

  - id: impl_write_test
    type: prompt
    command: speckit.write-test
    integration: claude
    input:
      args: >
        Discover the current batch: find all TODO tasks whose Depends-on
        tasks are all DONE. Process each task in the batch sequentially
        (write tests for TASK-N, then TASK-N+1, etc.). After processing
        all tasks in the batch, write the batch task list to
        .artifacts/batch_tasks.txt (format: "TASK-1, TASK-2, ...") and
        print "Batch complete: [N] tasks done."
        If no batch can be formed (no TODO tasks with all deps met), stop.
        Always check Depends-on before starting each task.
        Use the prompt context at .artifacts/prompts/[task_id]/context.md
        if available — it contains targeted plan sections for this task.

  - id: impl_write_test_track_tokens
    type: shell
    command: >
      bash scripts/track-token-budget.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}"
    continue_on_error: true

  - id: impl_test_review
    type: shell
    command: >
      bash scripts/verify-test-spec-alignment.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}"
      "{{ steps.impl_check_remaining.output.todo_task_id || '' }}"
    continue_on_error: true

  - id: impl_capture_spec_baseline
    type: shell
    command: >
      bash scripts/spec-diff-check.sh --capture
      "{{ steps.impl_check_remaining.output.feature_dir }}"
    continue_on_error: true

  - id: impl_execute
    type: prompt
    command: speckit.implement
    integration: claude
    input:
      args: >
        Implement the code to make the tests written by the previous step pass.
        If .artifacts/batch_tasks.txt exists (batch mode from write-test):
          implement each task in the batch sequentially.
          After the batch, remove .artifacts/batch_tasks.txt.
        Otherwise: implement only the first TODO task.
        Always check Depends-on before starting.

  - id: impl_execute_track_tokens
    type: shell
    command: >
      bash scripts/track-token-budget.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}"
    continue_on_error: true

  # ── Batch abort-on-failure (Issue 4) ─────────────────────────────
  # If the task reached the global correction cap (10), the batch failed.
  # Skip remaining batch tasks to avoid cascading bugs.
  - id: impl_batch_abort_check
    type: shell
    command: >
      bash scripts/state-engine.sh read
      "{{ steps.impl_check_remaining.output.feature_dir }}" corrections.global_total || echo "global_total=0"
    continue_on_error: true

  - id: impl_batch_abort_log
    type: if
    condition: >
      {{ steps.impl_batch_abort_check.output | default '0' }} >= 10
    then:
      - id: impl_batch_abort_record
        type: shell
        command: >
          echo "BATCH FAILED: TASK {{ steps.impl_check_remaining.output.todo_task_id || 'unknown' }} reached correction cap (10)" \
          >> "{{ steps.impl_check_remaining.output.feature_dir }}/.artifacts/batch-failures.txt"
        continue_on_error: true

  - id: impl_check_spec_drift
    type: shell
    command: >
      bash scripts/spec-diff-check.sh --check
      "{{ steps.impl_check_remaining.output.feature_dir }}" || true

  - id: impl_verify
    type: if
    condition: >
      {{ steps.impl_batch_abort_check.output | default '0' }} < 10
    then:
      - id: impl_verify_run
        type: prompt
        command: speckit.implement-verify
        integration: claude
        input:
          args: >
            Continue from the just-completed implementation.
            Run quality checks (STEP 3) and produce the completion report (STEP 4).
            Do NOT re-implement — only verify and report.
      - id: impl_verify_run_track_tokens
        type: shell
        command: >
          bash scripts/track-token-budget.sh
          "{{ steps.impl_check_remaining.output.feature_dir }}"
        continue_on_error: true

  - id: impl_velocity_record
    type: if
    condition: >
      {{ steps.impl_batch_abort_check.output | default '0' }} < 10
    then:
      - id: impl_run_velocity_record
        type: shell
        command: >
          bash scripts/velocity-tracker.sh record
          "{{ steps.impl_check_remaining.output.feature_dir }}"
          "{{ steps.impl_check_remaining.output.todo_task_id || 'unknown' }}"

  - id: impl_per_task_drift
    type: if
    condition: "{{ steps.impl_check_remaining.output.todo_count | int }} > 0"
    then:
      - id: impl_quick_drift
        type: shell
        command: >
          bash scripts/quick-drift-check.sh
          "{{ steps.impl_check_remaining.output.feature_dir }}"

  - id: impl_post_batch_consistency
    type: if
    condition: >
      {{ steps.impl_check_remaining.output.todo_count | int }} > 0 and
      {{ steps.impl_check_remaining.output.abandoned_count | int }} == 0
    then:
      - id: impl_batch_consistency
        type: prompt
        command: speckit.batch-consistency
        integration: claude
        input:
          args: >
            Run post-batch consistency check.
            Read the batch task list from .artifacts/batch_tasks.txt.
            This is lightweight — check only constraint drift and API surface.
            If .artifacts/batch_tasks.txt does not exist, skip silently.
            After checking drift and surface, also verify all tests in the
            batch still pass. Run the test suite for the entire feature
            directory. If any test fails, note which task introduced the
            regression.

      - id: impl_batch_regression
        type: if
        condition: >
          {{ steps.impl_check_remaining.output.todo_count | int }} > 0 and
          {{ steps.impl_check_remaining.output.abandoned_count | int }} == 0
        then:
          - id: impl_run_batch_regression
            type: shell
            command: >
              bash scripts/validate-tests.sh --full
              "{{ steps.impl_check_remaining.output.feature_dir }}" || true

  - id: impl_semantic_check
    type: if
    condition: >
      {{ steps.impl_check_remaining.output.todo_count | int }} > 0 and
      {{ steps.impl_check_remaining.output.abandoned_count | int }} == 0
    then:
      - id: impl_run_semantic_check
        type: shell
        command: >
          bash scripts/post-batch-semantic-check.sh
          "{{ steps.impl_check_remaining.output.feature_dir }}"
        continue_on_error: true

  - id: impl_merge_check
    type: if
    condition: >
      {{ steps.impl_check_remaining.output.todo_count | int }} > 0 and
      {{ steps.impl_check_remaining.output.abandoned_count | int }} == 0
    then:
      - id: impl_run_merge_check
        type: shell
        command: >
          bash scripts/verify-batch-consistency.sh
          "{{ steps.impl_check_remaining.output.feature_dir }}"

  - id: impl_post_verify_cp
    type: shell
    command: >
      bash scripts/post-verify-checkpoint.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}"

  - id: impl_scope_guard
    type: shell
    command: >
      bash scripts/scope-guard.sh --enforce
      "{{ steps.impl_check_remaining.output.feature_dir }}"
      "{{ steps.impl_check_remaining.output.todo_task_id || 'unknown' }}"

  - id: impl_context_compact
    type: if
    condition: "{{ steps.impl_loop_iteration.output.count || 1 }} % 10 == 0"
    then:
      - id: impl_run_context_compact
        type: shell
        command: >
          bash scripts/context-compact.sh
          "{{ steps.impl_check_remaining.output.feature_dir }}"
        continue_on_error: true

  - id: impl_increment_revision
    type: shell
    command: >
      bash scripts/check-task-revisions.sh
      "{{ steps.impl_check_remaining.output.feature_dir }}"
      "{{ steps.impl_check_remaining.output.todo_task_id || 'unknown' }}"
      "3"

