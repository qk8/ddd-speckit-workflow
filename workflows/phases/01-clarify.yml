# ── PHASE 1: CLARIFY (bounded) ──────────────────────────────────
# 5-round max clarification loop with coverage-gated progression.
# Round 1: List all ambiguities from project-brief.md (no questions yet)
# Rounds 2-5: Ask targeted questions for unresolved ambiguities
# Progression: Must resolve >= 80% of ambiguities before human can approve

steps:

  - id: cl_round
    type: while
    condition: "true"
    # max_iterations: 5 (source: ddd-clean-arch/workflow-config.json iteration_limits.clarify_round)

    max_iterations: 5
    steps:
      - id: cl_ask
        type: prompt
        integration: claude
        input:
          args: >
            Read project-brief.md fully.

            REVISION CONTEXT: If .specify/specs/[feature]/revision_history.md exists,
            read it. Do not repeat fixes that were already tried and rejected.

            PHASE 1 — Ambiguity Discovery (Round 1 only):
            List ALL ambiguities, gaps, and missing information in the project brief.
            Group them by category: architecture, data, security, performance, UX, ops.
            For each ambiguity, assign a severity: HIGH (blocks design decisions),
            MEDIUM (affects implementation details), LOW (nice to know).
            Print: "AMBIGUITY DISCOVERY: [N] ambiguities found (HIGH: [h], MEDIUM: [m], LOW: [l])"

            PHASE 2 — Targeted Questions (Rounds 2+):
            Based on what you read, ask 3-5 targeted questions ONLY for ambiguities
            that are still unresolved. Focus only on HIGH severity items.
            Do not ask about things already covered in the brief.
            Do not ask generic questions.

            Good questions probe: edge cases in the core domain, conflict
            resolution between competing requirements, specific compliance
            obligations, external system API constraints, and expected
            data volumes for the most critical operations.

      - id: cl_threshold
        type: shell
        command: "bash scripts/gate-threshold.sh clarify {{ steps.cl_round_iteration.output.count || 1 }}"

      - id: cl_coverage_check
        type: if
        condition: "{{ steps.cl_round_iteration.output.count || 1 }} >= 4"
        then:
          - id: cl_coverage_prompt
            type: prompt
            integration: claude
            input:
              args: >
                Summarize the coverage of clarification so far.
                Report: total ambiguities identified, ambiguities resolved,
                ambiguities remaining. Calculate coverage percentage.
                Print: "CLARIFICATION COVERAGE: [N]% resolved ([resolved]/[total] ambiguities)"

      - id: cl_review
        type: gate
        message: |
          ━━ CLARIFY ROUND {{ steps.cl_round_iteration.output.count || 1 }}/5 ━━

          Answer the clarifying questions above.
          Edit your answers directly in this gate if needed.
          Approve when requirements are well-understood.
          {% if steps.cl_round_iteration.output.count || 1 >= 4 %}
          {% if steps.cl_coverage_prompt.output.CLARIFICATION_COVERAGE %}
          **Coverage**: {{ steps.cl_coverage_prompt.output.CLARIFICATION_COVERAGE }}
          {% endif %}
          {% endif %}
          {% if steps.cl_threshold.output.AUTO_APPROVE == 'true' %}
          **Revision threshold exceeded** ({{ steps.cl_round_iteration.output.count || 1 }}/5).
          Approving on next iteration.
          {% endif %}
        options: [approve, re-clarify]
        on_re-clarify:
          - id: cl_record
            type: shell
            command: >
              bash scripts/record-and-trim.sh clarify_round
              "{{ steps.cl_round_iteration.output.count || 1 }}"
          - goto: cl_ask
