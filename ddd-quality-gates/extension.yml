id: ddd-quality-gates
name: "DDD Quality Gates"
version: "2.0.0"
author: "your-org"
description: >
  Adds eight quality-gate commands to Spec Kit: verify (spec-code drift
  detection), review (design quality across 5 dimensions), code-review
  (Phase 7 checklist: security, correctness, performance, maintainability,
  accessibility), correction (self-correction protocol: T/I/E/R triage,
  3-iteration limit, FAILURE_REPORT.md), retrospect (periodic alignment
  check with adaptive cadence: simple=15, medium=10, complex=5 tasks),
  status (progress dashboard), context (targeted spec loading for long
  sessions), and test (standalone live test and debug sessions). Works
  alongside the ddd-clean-arch preset.
tags:
  - ddd
  - quality
  - observability

commands:
  - speckit.verify
  - speckit.review
  - speckit.code-review
  - speckit.retrospect
  - speckit.status
  - speckit.context
  - speckit.test
