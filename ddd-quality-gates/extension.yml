id: ddd-quality-gates
name: "DDD Quality Gates"
version: "2.0.0"
author: "your-org"
description: >
  Adds six quality-gate commands to Spec Kit: verify (spec-code drift
  detection), review (design quality across 5 dimensions), retrospect
  (periodic alignment check with adaptive cadence: simple=15, medium=10, complex=5 tasks), status (progress dashboard),
  context (targeted spec loading for long sessions), and test (standalone
  live test and debug sessions). Works alongside the ddd-clean-arch preset.
tags:
  - ddd
  - quality
  - observability

commands:
  - speckit.verify
  - speckit.review
  - speckit.retrospect
  - speckit.status
  - speckit.context
  - speckit.test
